<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA Psychology A-Level Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--card:#fff;--text:#111;--muted:#666;--border:#e0e0e0;--accent:#2563eb;--accent-hover:#1d4ed8;--success:#16a34a;--error:#dc2626;--warning:#f59e0b;--ao1:#3b82f6;--ao2:#8b5cf6;--ao3:#ec4899;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.container{max-width:720px;margin:0 auto;padding:16px}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em}
h2{font-size:1.2rem;font-weight:600}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
button{cursor:pointer;border:none;border-radius:var(--radius);font-size:0.95rem;font-weight:500;padding:10px 20px;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-secondary:hover{background:var(--accent);color:#fff}
.btn-sm{padding:6px 14px;font-size:0.85rem}
.btn-danger{background:var(--error);color:#fff}
.btn-danger:hover{background:#b91c1c}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:8px}
header .score-display{font-size:0.9rem;color:var(--muted)}
header .score-display strong{color:var(--text)}

/* Screens */
.screen{display:none}
.screen.active{display:block}

/* Home */
#home .title-section{text-align:center;padding:40px 0 24px}
#home .title-section h1{font-size:2rem;margin-bottom:4px}
#home .title-section p{color:var(--muted);font-size:0.95rem}
.mode-grid{display:grid;gap:12px;margin:16px 0}
.mode-btn{text-align:left;padding:20px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);transition:all 0.15s}
.mode-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,0.1)}
.mode-btn .mode-title{font-weight:600;font-size:1rem}
.mode-btn .mode-desc{color:var(--muted);font-size:0.85rem;margin-top:2px}
.mode-btn .mode-badge{display:inline-block;font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:12px;margin-top:6px}
.mode-btn[data-mode="10"] .mode-badge{background:#dcfce7;color:#166534}
.mode-btn[data-mode="50"] .mode-badge{background:#fef3c7;color:#92400e}
.mode-btn[data-mode="100"] .mode-badge{background:#fce7f3;color:#9d174d}
.nav-links{display:flex;gap:8px;justify-content:center;margin-top:20px}

/* Topic Selection */
#topic-select .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.topic-btn{text-align:left;padding:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius)}
.topic-btn:hover{border-color:var(--accent)}
.topic-btn.selected{border-color:var(--accent);background:#eff6ff}
.topic-btn .topic-name{font-weight:600;font-size:0.9rem}
.topic-btn .topic-count{color:var(--muted);font-size:0.8rem}

/* Progress bar */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width 0.3s;border-radius:2px}

/* Question */
.question-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:12px}
.badge-topic{background:#f0f0f0;color:#333}
.badge-marks{background:#eff6ff;color:var(--accent)}
.badge-ao1{background:#dbeafe;color:var(--ao1)}
.badge-ao2{background:#ede9fe;color:var(--ao2)}
.badge-ao3{background:#fce7f3;color:var(--ao3)}
.question-text{font-size:1.05rem;font-weight:500;margin-bottom:16px;line-height:1.6}
.question-context{font-size:0.9rem;color:var(--muted);margin-bottom:12px;padding:12px;background:#f8f8f8;border-radius:var(--radius);line-height:1.5;font-style:italic}

/* MCQ Options */
.options-list{display:grid;gap:8px}
.option-btn{text-align:left;padding:14px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);font-size:0.95rem;line-height:1.4;transition:all 0.15s}
.option-btn:hover:not(.locked){border-color:var(--accent);background:#f8faff}
.option-btn.selected{border-color:var(--accent);background:#eff6ff}
.option-btn.correct{border-color:var(--success);background:#f0fdf4}
.option-btn.incorrect{border-color:var(--error);background:#fef2f2}
.option-btn.locked{cursor:default}
.option-letter{font-weight:700;color:var(--muted);margin-right:8px}

/* Multi-select MCQ */
.multi-hint{font-size:0.85rem;color:var(--muted);margin-bottom:8px}
.option-btn.multi-selected{border-color:var(--accent);background:#eff6ff}

/* Puzzle (16-marker) */
.puzzle-intro{font-size:0.9rem;color:var(--muted);margin-bottom:12px}
.puzzle-zone{min-height:60px;border:2px dashed var(--border);border-radius:var(--radius);padding:8px;margin-bottom:12px;transition:all 0.15s}
.puzzle-zone.drag-over{border-color:var(--accent);background:#f8faff}
.puzzle-zone-label{font-size:0.8rem;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.puzzle-zone-label .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot-ao1{background:var(--ao1)}
.dot-ao2{background:var(--ao2)}
.dot-ao3{background:var(--ao3)}
.puzzle-pieces-bank{border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:12px;background:#f8f8f8}
.puzzle-pieces-bank-label{font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:6px}
.puzzle-piece{padding:10px 14px;margin:4px;border-radius:6px;font-size:0.85rem;cursor:grab;user-select:none;display:inline-block;line-height:1.4;transition:all 0.15s;border:1.5px solid transparent;max-width:100%;word-wrap:break-word}
.puzzle-piece:active{cursor:grabbing;opacity:0.8}
.puzzle-piece.ao1{background:#dbeafe;border-color:#93c5fd}
.puzzle-piece.ao2{background:#ede9fe;border-color:#c4b5fd}
.puzzle-piece.ao3{background:#fce7f3;border-color:#f9a8d4}
.puzzle-piece.correct-pos{opacity:0.7;box-shadow:inset 0 0 0 2px var(--success)}
.puzzle-piece.incorrect-pos{box-shadow:inset 0 0 0 2px var(--error)}
.puzzle-piece.in-zone{margin:4px 0;display:block}

/* Feedback */
.feedback{padding:14px;border-radius:var(--radius);margin-top:12px;font-size:0.9rem;line-height:1.5}
.feedback.correct{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.feedback.incorrect{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.feedback.partial{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.feedback-answer{margin-top:6px;font-weight:500}

/* Action bar */
.action-bar{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.timer{font-size:0.85rem;color:var(--muted)}

/* Results */
#results .results-header{text-align:center;padding:24px 0}
.results-score{font-size:3rem;font-weight:700;color:var(--accent)}
.results-label{color:var(--muted);font-size:0.9rem}
.results-grade{font-size:1.2rem;font-weight:600;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.stat-card{text-align:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.stat-value{font-size:1.5rem;font-weight:700}
.stat-label{font-size:0.8rem;color:var(--muted)}
.results-actions{display:flex;gap:8px;justify-content:center;margin-top:16px}

/* Leaderboard */
#leaderboard .lb-table{width:100%;border-collapse:collapse;margin-top:12px}
.lb-table th,.lb-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:0.9rem}
.lb-table th{font-weight:600;color:var(--muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.04em}
.lb-table tr:hover td{background:#f8f8f8}
.lb-rank{font-weight:700;color:var(--accent)}
.lb-mode{font-size:0.75rem;padding:2px 6px;border-radius:8px}
.lb-empty{text-align:center;padding:40px;color:var(--muted)}
.lb-tabs{display:flex;gap:4px;margin-top:12px}
.lb-tab{padding:6px 14px;font-size:0.85rem;border-radius:20px;background:transparent;color:var(--muted);border:1px solid var(--border)}
.lb-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Name input modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;width:90%;max-width:360px}
.modal h2{margin-bottom:12px}
.modal input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:1rem;margin-bottom:12px}
.modal input:focus{outline:none;border-color:var(--accent)}

/* Responsive */
@media(max-width:600px){
  .container{padding:12px}
  #topic-select .topic-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .puzzle-piece{font-size:0.8rem;padding:8px 10px}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake 0.3s ease}

/* Streak indicator */
.streak{display:inline-flex;align-items:center;gap:4px;font-size:0.85rem;color:var(--warning);font-weight:600}
.streak-fire{font-size:1rem}
</style>
</head>
<body>

<div class="container">

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="title-section">
    <h1>AQA Psychology</h1>
    <p>A-Level Revision Quiz</p>
  </div>
  <div class="mode-grid">
    <button class="mode-btn" data-mode="10" onclick="selectMode(10)">
      <div class="mode-title">Quick Quiz</div>
      <div class="mode-desc">10 questions</div>
      <span class="mode-badge">Easy</span>
    </button>
    <button class="mode-btn" data-mode="50" onclick="selectMode(50)">
      <div class="mode-title">Standard</div>
      <div class="mode-desc">50 questions</div>
      <span class="mode-badge">Medium</span>
    </button>
    <button class="mode-btn" data-mode="100" onclick="selectMode(100)">
      <div class="mode-title">Hero Mode</div>
      <div class="mode-desc">100 questions</div>
      <span class="mode-badge">Hero</span>
    </button>
  </div>
  <div class="nav-links">
    <button class="btn-secondary btn-sm" onclick="showScreen('leaderboard')">Leaderboard</button>
  </div>
  <div style="text-align:center;margin-top:8px">
    <a href="" target="_blank" id="fullscreenLink" style="font-size:0.8rem;color:var(--muted);text-decoration:none">Open in new tab &#8599;</a>
  </div>
</div>

<!-- TOPIC SELECTION -->
<div id="topic-select" class="screen">
  <h2>Select Topics</h2>
  <p style="color:var(--muted);font-size:0.9rem;margin-top:4px">Choose which topics to include, or leave all selected for a full mix.</p>
  <div class="topic-grid" id="topicGrid"></div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn-secondary btn-sm" onclick="toggleAllTopics()">Toggle All</button>
  </div>
  <div style="margin-top:16px;display:flex;gap:8px">
    <button class="btn-primary" onclick="startGame()">Start Quiz</button>
    <button class="btn-secondary" onclick="showScreen('home')">Back</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <header>
    <div>
      <span id="qNumber" style="font-weight:600"></span>
      <span id="streakDisplay" class="streak" style="margin-left:8px"></span>
    </div>
    <div class="score-display">Score: <strong id="scoreDisplay">0</strong></div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="questionCard" class="card fade-in"></div>
  <div id="feedbackBox"></div>
  <div class="action-bar">
    <div class="timer" id="timerDisplay"></div>
    <div id="actionButtons"></div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results" class="screen">
  <div class="results-header">
    <div class="results-score" id="finalScore"></div>
    <div class="results-label" id="finalLabel"></div>
    <div class="results-grade" id="finalGrade"></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="statCorrect">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Best Streak</div></div>
    <div class="stat-card"><div class="stat-value" id="statTime">0:00</div><div class="stat-label">Time</div></div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="showScreen('home')">Play Again</button>
    <button class="btn-secondary" onclick="showScreen('leaderboard')">Leaderboard</button>
  </div>
</div>

<!-- LEADERBOARD SCREEN -->
<div id="leaderboard" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>Leaderboard</h2>
    <button class="btn-secondary btn-sm" onclick="showScreen('home')">Back</button>
  </div>
  <div class="lb-tabs">
    <button class="lb-tab active" onclick="filterLeaderboard('all',this)">All</button>
    <button class="lb-tab" onclick="filterLeaderboard(10,this)">Easy</button>
    <button class="lb-tab" onclick="filterLeaderboard(50,this)">Medium</button>
    <button class="lb-tab" onclick="filterLeaderboard(100,this)">Hero</button>
  </div>
  <div id="leaderboardContent"></div>
  <div style="margin-top:12px;text-align:center">
    <button class="btn-danger btn-sm" onclick="clearLeaderboard()">Clear Leaderboard</button>
  </div>
</div>

<!-- NAME MODAL -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h2>Enter Your Name</h2>
    <input type="text" id="playerNameInput" placeholder="Your name" maxlength="20" autofocus>
    <button class="btn-primary" onclick="submitName()" style="width:100%">Save Score</button>
  </div>
</div>

</div>

<script>
// ============================================
// QUESTION BANK
// ============================================
const QUESTIONS = [
// ---- SOCIAL INFLUENCE ----
{
  id:"si1",topic:"Social Influence",type:"mcq",marks:1,
  text:"In Asch's line experiment, what was the conformity rate on critical trials?",
  options:["12.5%","36.8%","50%","75%"],
  correct:1,
  explanation:"Asch found a conformity rate of approximately 36.8% across critical trials."
},
{
  id:"si2",topic:"Social Influence",type:"mcq",marks:1,
  text:"In Milgram's original obedience study, what percentage of participants administered the maximum 450V shock?",
  options:["35%","50%","65%","80%"],
  correct:2,
  explanation:"65% of participants went to the maximum 450 volts in Milgram's original study."
},
{
  id:"si3",topic:"Social Influence",type:"mcq",marks:1,
  text:"Which type of conformity involves publicly agreeing but privately disagreeing?",
  options:["Internalisation","Identification","Compliance","Obedience"],
  correct:2,
  explanation:"Compliance involves publicly conforming but privately maintaining your own views."
},
{
  id:"si4",topic:"Social Influence",type:"mcq",marks:1,
  text:"What is the term for consistency of a minority's message over time?",
  options:["Synchronic consistency","Diachronic consistency","Flexibility","Commitment"],
  correct:1,
  explanation:"Diachronic consistency refers to maintaining the same message over time. Synchronic consistency is agreement between minority group members."
},
{
  id:"si5",topic:"Social Influence",type:"mcq",marks:1,
  text:"In Moscovici's blue slide study, what percentage of majority participants called a blue slide green when the minority was consistent?",
  options:["2%","8%","15%","32%"],
  correct:1,
  explanation:"8.42% of responses identified a blue slide as green when exposed to a consistent minority."
},
{
  id:"si6",topic:"Social Influence",type:"mcq",marks:1,
  text:"Which explanation of obedience proposes that people act as agents carrying out another person's wishes?",
  options:["Authoritarian personality","Legitimacy of authority","Agentic state","Social identity theory"],
  correct:2,
  explanation:"The agentic state theory proposes people shift from an autonomous state to acting as agents of an authority figure."
},
{
  id:"si7",topic:"Social Influence",type:"mcq",marks:1,
  text:"What personality type, according to Adorno, is associated with higher levels of obedience?",
  options:["Type A personality","Authoritarian personality","Extraverted personality","Neurotic personality"],
  correct:1,
  explanation:"Adorno proposed the authoritarian personality, measured by the F-scale, is linked to obedience to authority."
},
{
  id:"si8",topic:"Social Influence",type:"mcq",marks:1,
  text:"Which of these is NOT a factor that Milgram identified as increasing obedience?",
  options:["Proximity of authority","Prestigious location","Presence of allies","Wearing a uniform"],
  correct:2,
  explanation:"The presence of allies (social support) actually decreased obedience. When a confederate refused, obedience dropped to 10%."
},
{
  id:"si9",topic:"Social Influence",type:"mcq",marks:1,
  text:"Informational social influence is most likely to lead to which type of conformity?",
  options:["Compliance","Identification","Internalisation","Obedience"],
  correct:2,
  explanation:"Informational social influence occurs when we look to others for information about how to behave, leading to genuine change in beliefs (internalisation)."
},
{
  id:"si10",topic:"Social Influence",type:"mcq",marks:1,
  text:"What did Zimbardo's Stanford Prison Experiment demonstrate about conformity to social roles?",
  options:["People resist assigned roles","People quickly conform to assigned roles","Only prisoners conform to roles","Guards refuse to be cruel"],
  correct:1,
  explanation:"Zimbardo found both guards and prisoners quickly conformed to their assigned social roles, with guards becoming increasingly authoritarian."
},
{
  id:"si11",topic:"Social Influence",type:"mcq",marks:1,
  text:"Normative social influence is based on the desire to:",
  options:["Be correct","Gain information","Fit in and be accepted","Obey authority"],
  correct:2,
  explanation:"Normative social influence is driven by the desire to be liked and accepted by the group, avoiding rejection."
},
{
  id:"si12",topic:"Social Influence",type:"mcq",marks:1,
  text:"In which variation of Milgram's study did obedience drop to 20.5%?",
  options:["Run-down office block","Teacher and learner in same room","Teacher forced learner's hand onto plate","Experimenter gave instructions by phone"],
  correct:3,
  explanation:"When the experimenter gave instructions by phone rather than being in the room, obedience dropped to 20.5%."
},
// ---- MEMORY ----
{
  id:"me1",topic:"Memory",type:"mcq",marks:1,
  text:"What is the capacity of short-term memory according to Miller?",
  options:["5 plus or minus 2","7 plus or minus 2","9 plus or minus 2","Unlimited"],
  correct:1,
  explanation:"Miller proposed the 'magic number 7 plus or minus 2' for STM capacity."
},
{
  id:"me2",topic:"Memory",type:"mcq",marks:1,
  text:"Which component of the working memory model acts as the 'boss' directing attention?",
  options:["Phonological loop","Visuo-spatial sketchpad","Central executive","Episodic buffer"],
  correct:2,
  explanation:"The central executive is the key component that directs attention and allocates resources to the slave systems."
},
{
  id:"me3",topic:"Memory",type:"mcq",marks:1,
  text:"Episodic memories differ from semantic memories because they are:",
  options:["Memories of facts and general knowledge","Time-stamped autobiographical events","Procedural skills","Always accurate"],
  correct:1,
  explanation:"Episodic memories are personal, time-stamped autobiographical events, while semantic memories are factual knowledge."
},
{
  id:"me4",topic:"Memory",type:"mcq",marks:1,
  text:"The encoding specificity principle is associated with which explanation of forgetting?",
  options:["Proactive interference","Retroactive interference","Retrieval failure","Decay theory"],
  correct:2,
  explanation:"Tulving's encoding specificity principle underpins retrieval failure, where a lack of matching cues prevents access to stored memories."
},
{
  id:"me5",topic:"Memory",type:"mcq",marks:1,
  text:"Loftus and Palmer's study of car accident estimates demonstrates:",
  options:["Proactive interference","The misinformation effect from leading questions","Retrieval failure","Multi-store model validity"],
  correct:1,
  explanation:"Loftus and Palmer showed that the verb used in a leading question (e.g. 'smashed' vs 'contacted') affected speed estimates and false memories."
},
{
  id:"me6",topic:"Memory",type:"mcq",marks:1,
  text:"In Godden and Baddeley's study, divers recalled words best when:",
  options:["Always on land","Always underwater","Learning and recall environments matched","They used rehearsal strategies"],
  correct:2,
  explanation:"Divers recalled best when learning and recall contexts matched (both on land or both underwater), supporting context-dependent retrieval."
},
{
  id:"me7",topic:"Memory",type:"mcq",marks:1,
  text:"Which two components make up the phonological loop?",
  options:["Inner eye and inner voice","Phonological store and articulatory process","Central executive and episodic buffer","Visual cache and inner scribe"],
  correct:1,
  explanation:"The phonological loop consists of the phonological store ('inner ear') and the articulatory process ('inner voice')."
},
{
  id:"me8",topic:"Memory",type:"mcq",marks:1,
  text:"The cognitive interview technique was developed by:",
  options:["Loftus and Palmer","Fisher and Geiselman","Baddeley and Hitch","Bartlett"],
  correct:1,
  explanation:"Fisher and Geiselman developed the cognitive interview to improve eyewitness recall."
},
{
  id:"me9",topic:"Memory",type:"mcq",marks:1,
  text:"Proactive interference occurs when:",
  options:["New learning disrupts old memories","Old learning disrupts new memories","Cues are absent at retrieval","Memories decay over time"],
  correct:1,
  explanation:"Proactive interference is when previously learned material interferes with the ability to recall newer information."
},
{
  id:"me10",topic:"Memory",type:"mcq",marks:1,
  text:"Which of the following is NOT a component of the cognitive interview?",
  options:["Report everything","Reinstate the context","Recall in reverse order","Use leading questions"],
  correct:3,
  explanation:"The cognitive interview specifically avoids leading questions. Its techniques include report everything, reinstate context, recall in reverse order, and change perspective."
},
{
  id:"me11",topic:"Memory",type:"mcq",marks:1,
  text:"The multi-store model was proposed by:",
  options:["Baddeley and Hitch","Atkinson and Shiffrin","Tulving","Bartlett"],
  correct:1,
  explanation:"Atkinson and Shiffrin (1968) proposed the multi-store model with sensory register, STM, and LTM."
},
{
  id:"me12",topic:"Memory",type:"mcq",marks:1,

// ============================================
// GAME STATE
// ============================================
let state = {
  mode: 10,
  topics: [],
  questions: [],
  currentIndex: 0,
  score: 0,
  maxScore: 0,
  streak: 0,
  bestStreak: 0,
  startTime: 0,
  answered: false,
  puzzleState: null
};

// ============================================
// TOPIC MANAGEMENT
// ============================================
function getTopics() {
  const topics = new Set();
  QUESTIONS.forEach(q => topics.add(q.topic));
  return [...topics].sort();
}

function renderTopics() {
  const grid = document.getElementById('topicGrid');
  const topics = getTopics();
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.topic] = (counts[q.topic] || 0) + 1; });

  grid.innerHTML = topics.map(t => `
    <button class="topic-btn selected" data-topic="${t}" onclick="toggleTopic(this)">
      <div class="topic-name">${t}</div>
      <div class="topic-count">${counts[t]} questions</div>
    </button>
  `).join('');
  state.topics = [...topics];
}

function toggleTopic(btn) {
  btn.classList.toggle('selected');
  const topic = btn.dataset.topic;
  if (btn.classList.contains('selected')) {
    if (!state.topics.includes(topic)) state.topics.push(topic);
  } else {
    state.topics = state.topics.filter(t => t !== topic);
  }
}

function toggleAllTopics() {
  const btns = document.querySelectorAll('.topic-btn');
  const allSelected = [...btns].every(b => b.classList.contains('selected'));
  btns.forEach(b => {
    if (allSelected) {
      b.classList.remove('selected');
    } else {
      b.classList.add('selected');
    }
  });
  state.topics = allSelected ? [] : getTopics();
}

// ============================================
// NAVIGATION
// ============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'leaderboard') renderLeaderboard();
  if (id === 'topic-select') renderTopics();
}

function selectMode(n) {
  state.mode = n;
  showScreen('topic-select');
}

// ============================================
// GAME LOGIC
// ============================================
function startGame() {
  if (state.topics.length === 0) {
    alert('Please select at least one topic.');
    return;
  }

  // Filter and shuffle questions
  let pool = QUESTIONS.filter(q => state.topics.includes(q.topic));
  pool = shuffle([...pool]);

  // For the selected mode, pick the right number
  // Ensure at least ~15% are puzzle questions if available
  const puzzles = pool.filter(q => q.type === 'puzzle16');
  const mcqs = pool.filter(q => q.type === 'mcq');

  let selected = [];
  const targetPuzzles = Math.min(puzzles.length, Math.max(1, Math.floor(state.mode * 0.12)));

  if (state.mode <= puzzles.length + mcqs.length) {
    selected = shuffle([...puzzles.slice(0, targetPuzzles), ...mcqs.slice(0, state.mode - targetPuzzles)]);
  } else {
    // Not enough unique questions - recycle
    selected = shuffle([...pool]);
    while (selected.length < state.mode) {
      selected.push(...shuffle([...pool]));
    }
  }
  selected = selected.slice(0, state.mode);

  state.questions = selected;
  state.currentIndex = 0;
  state.score = 0;
  state.maxScore = selected.reduce((s, q) => s + q.marks, 0);
  state.streak = 0;
  state.bestStreak = 0;
  state.startTime = Date.now();
  state.answered = false;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  state.answered = false;

  // Update header
  document.getElementById('qNumber').textContent = `${state.currentIndex + 1}/${state.questions.length}`;
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('progressFill').style.width = `${(state.currentIndex / state.questions.length) * 100}%`;
  updateStreak();

  const card = document.getElementById('questionCard');
  card.className = 'card fade-in';
  document.getElementById('feedbackBox').innerHTML = '';

  if (q.type === 'mcq') {
    renderMCQ(q, card);
  } else if (q.type === 'puzzle16') {
    renderPuzzle(q, card);
  }

  // Action buttons
  document.getElementById('actionButtons').innerHTML = '';
  updateTimer();
}

function renderMCQ(q, card) {
  const badges = `
    <div class="question-meta">
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-marks">${q.marks} mark${q.marks > 1 ? 's' : ''}</span>
    </div>
  `;

  card.innerHTML = `
    ${badges}
    ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
    <div class="question-text">${q.text}</div>
    <div class="options-list">
      ${q.options.map((opt, i) => `
        <button class="option-btn" data-idx="${i}" onclick="selectMCQ(${i})">
          <span class="option-letter">${String.fromCharCode(65 + i)}</span>${opt}
        </button>
      `).join('')}
    </div>
  `;
}

function selectMCQ(idx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.add('locked'));

  const isCorrect = idx === q.correct;

  btns[q.correct].classList.add('correct');
  if (!isCorrect) {
    btns[idx].classList.add('incorrect');
    btns[idx].classList.add('shake');
  }

  if (isCorrect) {
    state.score += q.marks;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
  }

  document.getElementById('scoreDisplay').textContent = state.score;
  updateStreak();

  showFeedback(isCorrect, q.explanation, isCorrect ? q.marks : 0, q.marks);
  showNextButton();
}

// ============================================
// 16-MARKER PUZZLE
// ============================================
function renderPuzzle(q, card) {
  // Shuffle pieces for the bank
  const shuffledPieces = shuffle(q.pieces.map((p, i) => ({...p, origIdx: i})));

  state.puzzleState = {
    pieces: shuffledPieces,
    zones: { AO1: [], AO2: [], AO3: [] },
    bank: shuffledPieces.map((_, i) => i),
    question: q
  };

  const badges = `
    <div class="question-meta">
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-marks">${q.marks} marks</span>
      <span class="badge badge-ao1">AO1</span>
      <span class="badge badge-ao2">AO2</span>
      <span class="badge badge-ao3">AO3</span>
    </div>
  `;

  // Determine which AO types exist
  const aoTypes = [...new Set(q.pieces.map(p => p.ao))].sort();

  card.innerHTML = `
    ${badges}
    <div class="question-text">${q.text}</div>
    <div class="puzzle-intro">Drag the pieces into the correct AO zones in a logical order. Each piece is colour-coded by its correct AO type.</div>

    ${aoTypes.map(ao => `
      <div class="puzzle-zone-label"><span class="dot dot-${ao.toLowerCase()}"></span> ${ao} ${ao === 'AO1' ? '(Knowledge)' : ao === 'AO2' ? '(Application)' : '(Evaluation)'}</div>
      <div class="puzzle-zone" id="zone-${ao}" data-ao="${ao}"
           ondragover="puzzleDragOver(event)" ondrop="puzzleDrop(event)" ondragleave="puzzleDragLeave(event)">
      </div>
    `).join('')}

    <div class="puzzle-pieces-bank" id="puzzleBank" ondragover="puzzleDragOver(event)" ondrop="puzzleDropBank(event)" ondragleave="puzzleDragLeave(event)">
      <div class="puzzle-pieces-bank-label">Available Pieces</div>
      <div id="bankPieces">
        ${shuffledPieces.map((p, i) => puzzlePieceHTML(p, i)).join('')}
      </div>
    </div>

    <button class="btn-primary" onclick="submitPuzzle()">Submit Answer</button>
  `;

  // Add touch support
  initTouchDrag();
}

function puzzlePieceHTML(piece, idx) {
  return `<div class="puzzle-piece ${piece.ao.toLowerCase()}" draggable="true" data-idx="${idx}"
    ondragstart="puzzleDragStart(event)">${piece.text}</div>`;
}

function puzzleDragStart(e) {
  e.dataTransfer.setData('text/plain', e.target.dataset.idx);
  e.dataTransfer.effectAllowed = 'move';
  e.target.style.opacity = '0.5';
  setTimeout(() => e.target.style.opacity = '1', 0);
}

function puzzleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function puzzleDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function puzzleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const idx = parseInt(e.dataTransfer.getData('text/plain'));
  const targetAO = e.currentTarget.dataset.ao;

  // Remove from current location
  removePieceFromAll(idx);

  // Add to zone
  state.puzzleState.zones[targetAO].push(idx);

  renderPuzzleState();
}

function puzzleDropBank(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const idx = parseInt(e.dataTransfer.getData('text/plain'));

  // Remove from current location
  removePieceFromAll(idx);

  // Add back to bank
  state.puzzleState.bank.push(idx);

  renderPuzzleState();
}

function removePieceFromAll(idx) {
  const ps = state.puzzleState;
  ps.bank = ps.bank.filter(i => i !== idx);
  for (const ao of Object.keys(ps.zones)) {
    ps.zones[ao] = ps.zones[ao].filter(i => i !== idx);
  }
}

function renderPuzzleState() {
  const ps = state.puzzleState;

  // Render zones
  for (const ao of Object.keys(ps.zones)) {
    const zone = document.getElementById(`zone-${ao}`);
    if (!zone) continue;
    zone.innerHTML = ps.zones[ao].map(idx => {
      const p = ps.pieces[idx];
      return `<div class="puzzle-piece ${p.ao.toLowerCase()} in-zone" draggable="true" data-idx="${idx}"
        ondragstart="puzzleDragStart(event)">${p.text}</div>`;
    }).join('') || '';
  }

  // Render bank
  const bankEl = document.getElementById('bankPieces');
  if (bankEl) {
    bankEl.innerHTML = ps.bank.map(idx => {
      const p = ps.pieces[idx];
      return puzzlePieceHTML(p, idx);
    }).join('') || '<span style="color:var(--muted);font-size:0.85rem">All pieces placed!</span>';
  }

  initTouchDrag();
}

function submitPuzzle() {
  if (state.answered) return;
  state.answered = true;

  const ps = state.puzzleState;
  const q = ps.question;
  let correctPlacements = 0;
  let totalPieces = q.pieces.length;

  // Check each piece's zone placement
  for (const ao of Object.keys(ps.zones)) {
    for (const idx of ps.zones[ao]) {
      const piece = ps.pieces[idx];
      if (piece.ao === ao) {
        correctPlacements++;
      }
    }
  }

  // Pieces left in bank get 0
  const pctCorrect = correctPlacements / totalPieces;
  const earned = Math.round(pctCorrect * q.marks);

  state.score += earned;
  if (pctCorrect >= 0.8) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
  }

  document.getElementById('scoreDisplay').textContent = state.score;
  updateStreak();

  // Mark pieces
  for (const ao of Object.keys(ps.zones)) {
    const zone = document.getElementById(`zone-${ao}`);
    if (!zone) continue;
    const pieceDivs = zone.querySelectorAll('.puzzle-piece');
    pieceDivs.forEach(div => {
      const idx = parseInt(div.dataset.idx);
      const piece = ps.pieces[idx];
      div.draggable = false;
      if (piece.ao === ao) {
        div.classList.add('correct-pos');
      } else {
        div.classList.add('incorrect-pos');
        div.innerHTML += ` <span style="font-size:0.75rem;font-weight:600;color:var(--error);">(${piece.ao})</span>`;
      }
    });
  }

  // Mark bank pieces as wrong (shouldn't be there)
  const bankPieceDivs = document.querySelectorAll('#bankPieces .puzzle-piece');
  bankPieceDivs.forEach(div => {
    div.draggable = false;
    div.classList.add('incorrect-pos');
  });

  const isCorrect = pctCorrect >= 0.8;
  const isPartial = pctCorrect >= 0.4 && pctCorrect < 0.8;

  let msg = '';
  if (isCorrect) {
    msg = `Excellent! You correctly placed ${correctPlacements}/${totalPieces} pieces.`;
  } else if (isPartial) {
    msg = `Good effort! You correctly placed ${correctPlacements}/${totalPieces} pieces.`;
  } else {
    msg = `You placed ${correctPlacements}/${totalPieces} pieces correctly. Review the AO classifications above.`;
  }

  showFeedback(isCorrect, msg, earned, q.marks, isPartial);
  showNextButton();
}

// ============================================
// TOUCH DRAG SUPPORT
// ============================================
function initTouchDrag() {
  document.querySelectorAll('.puzzle-piece[draggable="true"]').forEach(piece => {
    piece.addEventListener('touchstart', touchStart, {passive: false});
  });
}

let touchDragEl = null;
let touchClone = null;

function touchStart(e) {
  e.preventDefault();
  touchDragEl = e.target.closest('.puzzle-piece');
  if (!touchDragEl) return;

  touchClone = touchDragEl.cloneNode(true);
  touchClone.style.position = 'fixed';
  touchClone.style.pointerEvents = 'none';
  touchClone.style.opacity = '0.8';
  touchClone.style.zIndex = '1000';
  touchClone.style.width = touchDragEl.offsetWidth + 'px';
  document.body.appendChild(touchClone);

  const touch = e.touches[0];
  touchClone.style.left = (touch.clientX - 20) + 'px';
  touchClone.style.top = (touch.clientY - 20) + 'px';

  document.addEventListener('touchmove', touchMove, {passive: false});
  document.addEventListener('touchend', touchEnd, {passive: false});
}

function touchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const touch = e.touches[0];
  touchClone.style.left = (touch.clientX - 20) + 'px';
  touchClone.style.top = (touch.clientY - 20) + 'px';
}

function touchEnd(e) {
  if (!touchDragEl || !touchClone) return;
  document.removeEventListener('touchmove', touchMove);
  document.removeEventListener('touchend', touchEnd);

  const touch = e.changedTouches[0];
  touchClone.remove();
  touchClone = null;

  const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
  if (!dropTarget) return;

  const zone = dropTarget.closest('.puzzle-zone');
  const bank = dropTarget.closest('.puzzle-pieces-bank');
  const idx = parseInt(touchDragEl.dataset.idx);

  if (zone && zone.dataset.ao) {
    removePieceFromAll(idx);
    state.puzzleState.zones[zone.dataset.ao].push(idx);
    renderPuzzleState();
  } else if (bank) {
    removePieceFromAll(idx);
    state.puzzleState.bank.push(idx);
    renderPuzzleState();
  }

  touchDragEl = null;
}

// ============================================
// FEEDBACK & NAVIGATION
// ============================================
function showFeedback(correct, msg, earned, total, partial) {
  const type = correct ? 'correct' : (partial ? 'partial' : 'incorrect');
  const prefix = correct ? 'Correct!' : (partial ? 'Partial Credit' : 'Incorrect');
  document.getElementById('feedbackBox').innerHTML = `
    <div class="feedback ${type} fade-in">
      <strong>${prefix}</strong> ${earned !== undefined ? `(${earned}/${total} marks)` : ''}<br>
      <span class="feedback-answer">${msg}</span>
    </div>
  `;
}

function showNextButton() {
  const isLast = state.currentIndex >= state.questions.length - 1;
  document.getElementById('actionButtons').innerHTML = `
    <button class="btn-primary" onclick="${isLast ? 'finishGame()' : 'nextQuestion()'}">${isLast ? 'See Results' : 'Next'}</button>
  `;
}

function nextQuestion() {
  state.currentIndex++;
  renderQuestion();
}

function finishGame() {
  document.getElementById('progressFill').style.width = '100%';
  const elapsed = Date.now() - state.startTime;
  const pct = Math.round((state.score / state.maxScore) * 100);
  const mins = Math.floor(elapsed / 60000);
  const secs = Math.floor((elapsed % 60000) / 1000);

  document.getElementById('finalScore').textContent = `${pct}%`;
  document.getElementById('finalLabel').textContent = `${state.score} / ${state.maxScore} marks`;
  document.getElementById('finalGrade').textContent = getGrade(pct);
  document.getElementById('statCorrect').textContent = `${state.score}/${state.maxScore}`;
  document.getElementById('statStreak').textContent = state.bestStreak;
  document.getElementById('statTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

  showScreen('results');

  // Prompt for name
  setTimeout(() => {
    document.getElementById('nameModal').classList.add('active');
    document.getElementById('playerNameInput').focus();
  }, 500);
}

function getGrade(pct) {
  if (pct >= 90) return 'A*';
  if (pct >= 80) return 'A';
  if (pct >= 70) return 'B';
  if (pct >= 60) return 'C';
  if (pct >= 50) return 'D';
  if (pct >= 40) return 'E';
  return 'U';
}

function submitName() {
  const name = document.getElementById('playerNameInput').value.trim() || 'Anonymous';
  document.getElementById('nameModal').classList.remove('active');
  document.getElementById('playerNameInput').value = '';

  const elapsed = Date.now() - state.startTime;
  const pct = Math.round((state.score / state.maxScore) * 100);

  const entry = {
    name,
    score: state.score,
    maxScore: state.maxScore,
    pct,
    mode: state.mode,
    streak: state.bestStreak,
    time: elapsed,
    date: new Date().toISOString()
  };

  saveToLeaderboard(entry);
}

// Handle Enter key in name input
document.getElementById('playerNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

// ============================================
// STREAK & TIMER
// ============================================
function updateStreak() {
  const el = document.getElementById('streakDisplay');
  if (state.streak >= 3) {
    el.innerHTML = `<span class="streak-fire">&#128293;</span>${state.streak}`;
  } else {
    el.textContent = '';
  }
}

function updateTimer() {
  const el = document.getElementById('timerDisplay');
  const update = () => {
    if (!document.getElementById('quiz').classList.contains('active')) return;
    const elapsed = Date.now() - state.startTime;
    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    el.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    requestAnimationFrame(update);
  };
  update();
}

// ============================================
// LEADERBOARD
// ============================================
function getLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem('psych_leaderboard') || '[]');
  } catch { return []; }
}

function saveToLeaderboard(entry) {
  const lb = getLeaderboard();
  lb.push(entry);
  lb.sort((a, b) => b.pct - a.pct || a.time - b.time);
  // Keep top 100
  localStorage.setItem('psych_leaderboard', JSON.stringify(lb.slice(0, 100)));
}

let currentLBFilter = 'all';

function filterLeaderboard(mode, btn) {
  currentLBFilter = mode;
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderLeaderboard();
}

function renderLeaderboard() {
  let lb = getLeaderboard();
  if (currentLBFilter !== 'all') {
    lb = lb.filter(e => e.mode === currentLBFilter);
  }

  const container = document.getElementById('leaderboardContent');
  if (lb.length === 0) {
    container.innerHTML = '<div class="lb-empty">No scores yet. Play a quiz to get started!</div>';
    return;
  }

  const modeColors = {10:'#dcfce7',50:'#fef3c7',100:'#fce7f3'};
  const modeLabels = {10:'Easy',50:'Medium',100:'Hero'};

  container.innerHTML = `
    <table class="lb-table">
      <thead><tr><th>#</th><th>Name</th><th>Score</th><th>Mode</th><th>Streak</th><th>Time</th></tr></thead>
      <tbody>
        ${lb.slice(0, 20).map((e, i) => {
          const mins = Math.floor(e.time / 60000);
          const secs = Math.floor((e.time % 60000) / 1000);
          return `<tr>
            <td class="lb-rank">${i + 1}</td>
            <td>${escHTML(e.name)}</td>
            <td><strong>${e.pct}%</strong> <span style="color:var(--muted);font-size:0.8rem">(${e.score}/${e.maxScore})</span></td>
            <td><span class="lb-mode" style="background:${modeColors[e.mode]}">${modeLabels[e.mode]}</span></td>
            <td>${e.streak}</td>
            <td>${mins}:${secs.toString().padStart(2, '0')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function clearLeaderboard() {
  if (confirm('Clear all leaderboard data?')) {
    localStorage.removeItem('psych_leaderboard');
    renderLeaderboard();
  }
}

// ============================================
// UTILITIES
// ============================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Close modal on outside click
document.getElementById('nameModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) submitName();
});

// Set fullscreen link to current page URL
document.getElementById('fullscreenLink').href = window.location.href;
</script>
