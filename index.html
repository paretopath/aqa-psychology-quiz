<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA Psychology A-Level Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--card:#fff;--text:#111;--muted:#666;--border:#e0e0e0;--accent:#2563eb;--accent-hover:#1d4ed8;--success:#16a34a;--error:#dc2626;--warning:#f59e0b;--ao1:#3b82f6;--ao2:#8b5cf6;--ao3:#ec4899;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.container{max-width:720px;margin:0 auto;padding:16px}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em}
h2{font-size:1.2rem;font-weight:600}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
button{cursor:pointer;border:none;border-radius:var(--radius);font-size:0.95rem;font-weight:500;padding:10px 20px;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-secondary:hover{background:var(--accent);color:#fff}
.btn-sm{padding:6px 14px;font-size:0.85rem}
.btn-danger{background:var(--error);color:#fff}
.btn-danger:hover{background:#b91c1c}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:8px}
header .score-display{font-size:0.9rem;color:var(--muted)}
header .score-display strong{color:var(--text)}
.screen{display:none}
.screen.active{display:block}
#home .title-section{text-align:center;padding:40px 0 24px}
#home .title-section h1{font-size:2rem;margin-bottom:4px}
#home .title-section p{color:var(--muted);font-size:0.95rem}
.mode-grid{display:grid;gap:12px;margin:16px 0}
.mode-btn{text-align:left;padding:20px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);transition:all 0.15s}
.mode-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,0.1)}
.mode-btn .mode-title{font-weight:600;font-size:1rem}
.mode-btn .mode-desc{color:var(--muted);font-size:0.85rem;margin-top:2px}
.mode-btn .mode-badge{display:inline-block;font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:12px;margin-top:6px}
.mode-btn[data-mode="10"] .mode-badge{background:#dcfce7;color:#166534}
.mode-btn[data-mode="50"] .mode-badge{background:#fef3c7;color:#92400e}
.mode-btn[data-mode="100"] .mode-badge{background:#fce7f3;color:#9d174d}
.nav-links{display:flex;gap:8px;justify-content:center;margin-top:20px}
#topic-select .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.topic-btn{text-align:left;padding:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius)}
.topic-btn:hover{border-color:var(--accent)}
.topic-btn.selected{border-color:var(--accent);background:#eff6ff}
.topic-btn .topic-name{font-weight:600;font-size:0.9rem}
.topic-btn .topic-count{color:var(--muted);font-size:0.8rem}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width 0.3s;border-radius:2px}
.question-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:12px}
.badge-topic{background:#f0f0f0;color:#333}
.badge-marks{background:#eff6ff;color:var(--accent)}
.badge-type{background:#f0fdf4;color:#166534}
.badge-ao1{background:#dbeafe;color:var(--ao1)}
.badge-ao2{background:#ede9fe;color:var(--ao2)}
.badge-ao3{background:#fce7f3;color:var(--ao3)}
.question-text{font-size:1.05rem;font-weight:500;margin-bottom:16px;line-height:1.6}
.question-context{font-size:0.9rem;color:var(--muted);margin-bottom:12px;padding:12px;background:#f8f8f8;border-radius:var(--radius);line-height:1.5;font-style:italic}
.options-list{display:grid;gap:8px}
.option-btn{text-align:left;padding:14px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);font-size:0.95rem;line-height:1.4;transition:all 0.15s}
.option-btn:hover:not(.locked){border-color:var(--accent);background:#f8faff}
.option-btn.selected{border-color:var(--accent);background:#eff6ff}
.option-btn.correct{border-color:var(--success);background:#f0fdf4}
.option-btn.incorrect{border-color:var(--error);background:#fef2f2}
.option-btn.locked{cursor:default}
.option-letter{font-weight:700;color:var(--muted);margin-right:8px}
.multi-hint{font-size:0.85rem;color:var(--muted);margin-bottom:8px}
.option-btn.multi-selected{border-color:var(--accent);background:#eff6ff}
.puzzle-intro{font-size:0.9rem;color:var(--muted);margin-bottom:12px}
.puzzle-zone{min-height:60px;border:2px dashed var(--border);border-radius:var(--radius);padding:8px;margin-bottom:12px;transition:all 0.15s}
.puzzle-zone.drag-over{border-color:var(--accent);background:#f8faff}
.puzzle-zone-label{font-size:0.8rem;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.puzzle-zone-label .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot-ao1{background:var(--ao1)}
.dot-ao2{background:var(--ao2)}
.dot-ao3{background:var(--ao3)}
.puzzle-pieces-bank{border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:12px;background:#f8f8f8}
.puzzle-pieces-bank-label{font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:6px}
.puzzle-piece{padding:10px 14px;margin:4px;border-radius:6px;font-size:0.85rem;cursor:grab;user-select:none;display:inline-block;line-height:1.4;transition:all 0.15s;border:1.5px solid transparent;max-width:100%;word-wrap:break-word}
.puzzle-piece:active{cursor:grabbing;opacity:0.8}
.puzzle-piece.ao1{background:#dbeafe;border-color:#93c5fd}
.puzzle-piece.ao2{background:#ede9fe;border-color:#c4b5fd}
.puzzle-piece.ao3{background:#fce7f3;border-color:#f9a8d4}
.puzzle-piece.correct-pos{opacity:0.7;box-shadow:inset 0 0 0 2px var(--success)}
.puzzle-piece.incorrect-pos{box-shadow:inset 0 0 0 2px var(--error)}
.puzzle-piece.in-zone{margin:4px 0;display:block}
.feedback{padding:14px;border-radius:var(--radius);margin-top:12px;font-size:0.9rem;line-height:1.5}
.feedback.correct{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.feedback.incorrect{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.feedback.partial{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.feedback-answer{margin-top:6px;font-weight:500}
.action-bar{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.timer{font-size:0.85rem;color:var(--muted)}
#results .results-header{text-align:center;padding:24px 0}
.results-score{font-size:3rem;font-weight:700;color:var(--accent)}
.results-label{color:var(--muted);font-size:0.9rem}
.results-grade{font-size:1.2rem;font-weight:600;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.stat-card{text-align:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.stat-value{font-size:1.5rem;font-weight:700}
.stat-label{font-size:0.8rem;color:var(--muted)}
.results-actions{display:flex;gap:8px;justify-content:center;margin-top:16px}
#leaderboard .lb-table{width:100%;border-collapse:collapse;margin-top:12px}
.lb-table th,.lb-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:0.9rem}
.lb-table th{font-weight:600;color:var(--muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.04em}
.lb-table tr:hover td{background:#f8f8f8}
.lb-rank{font-weight:700;color:var(--accent)}
.lb-mode{font-size:0.75rem;padding:2px 6px;border-radius:8px}
.lb-empty{text-align:center;padding:40px;color:var(--muted)}
.lb-tabs{display:flex;gap:4px;margin-top:12px}
.lb-tab{padding:6px 14px;font-size:0.85rem;border-radius:20px;background:transparent;color:var(--muted);border:1px solid var(--border)}
.lb-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;width:90%;max-width:360px}
.modal h2{margin-bottom:12px}
.modal input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:1rem;margin-bottom:12px}
.modal input:focus{outline:none;border-color:var(--accent)}
/* Multi-select submit */
.multi-submit-bar{margin-top:12px;display:flex;gap:8px;align-items:center}
.multi-counter{font-size:0.85rem;color:var(--muted)}
/* Key points checklist for 2-4 mark */
.keypoint-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;font-size:0.95rem;line-height:1.4;transition:all 0.15s}
.keypoint-item:hover:not(.locked){border-color:var(--accent);background:#f8faff}
.keypoint-item.selected{border-color:var(--accent);background:#eff6ff}
.keypoint-item.correct{border-color:var(--success);background:#f0fdf4}
.keypoint-item.incorrect{border-color:var(--error);background:#fef2f2}
.keypoint-item.missed{border-color:var(--warning);background:#fffbeb}
.keypoint-item.locked{cursor:default}
.keypoint-check{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.15s}
.keypoint-item.selected .keypoint-check{background:var(--accent);border-color:var(--accent);color:#fff}
.keypoint-item.correct .keypoint-check{background:var(--success);border-color:var(--success);color:#fff}
.keypoint-item.incorrect .keypoint-check{background:var(--error);border-color:var(--error);color:#fff}
.keypoint-item.missed .keypoint-check{background:var(--warning);border-color:var(--warning);color:#fff}
@media(max-width:600px){
  .container{padding:12px}
  #topic-select .topic-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .puzzle-piece{font-size:0.8rem;padding:8px 10px}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake 0.3s ease}
.streak{display:inline-flex;align-items:center;gap:4px;font-size:0.85rem;color:var(--warning);font-weight:600}
.streak-fire{font-size:1rem}
</style>
</head>
<body>

<div class="container">

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="title-section">
    <h1>AQA Psychology</h1>
    <p>A-Level Revision Quiz</p>
  </div>
  <div class="mode-grid">
    <button class="mode-btn" data-mode="10" onclick="selectMode(10)">
      <div class="mode-title">Quick Quiz</div>
      <div class="mode-desc">10 questions</div>
      <span class="mode-badge">Easy</span>
    </button>
    <button class="mode-btn" data-mode="50" onclick="selectMode(50)">
      <div class="mode-title">Standard</div>
      <div class="mode-desc">50 questions</div>
      <span class="mode-badge">Medium</span>
    </button>
    <button class="mode-btn" data-mode="100" onclick="selectMode(100)">
      <div class="mode-title">Hero Mode</div>
      <div class="mode-desc">100 questions</div>
      <span class="mode-badge">Hero</span>
    </button>
  </div>
  <div class="nav-links">
    <button class="btn-secondary btn-sm" onclick="showScreen('leaderboard')">Leaderboard</button>
  </div>
  <div style="text-align:center;margin-top:8px">
    <a href="" target="_blank" id="fullscreenLink" style="font-size:0.8rem;color:var(--muted);text-decoration:none">Open in new tab &#8599;</a>
  </div>
</div>

<!-- TOPIC SELECTION -->
<div id="topic-select" class="screen">
  <h2>Select Topics</h2>
  <p style="color:var(--muted);font-size:0.9rem;margin-top:4px">Choose which topics to include, or leave all selected for a full mix.</p>
  <div class="topic-grid" id="topicGrid"></div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn-secondary btn-sm" onclick="toggleAllTopics()">Toggle All</button>
  </div>
  <div style="margin-top:16px;display:flex;gap:8px">
    <button class="btn-primary" onclick="startGame()">Start Quiz</button>
    <button class="btn-secondary" onclick="showScreen('home')">Back</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <header>
    <div>
      <span id="qNumber" style="font-weight:600"></span>
      <span id="streakDisplay" class="streak" style="margin-left:8px"></span>
    </div>
    <div class="score-display">Score: <strong id="scoreDisplay">0</strong></div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="questionCard" class="card fade-in"></div>
  <div id="feedbackBox"></div>
  <div class="action-bar">
    <div class="timer" id="timerDisplay"></div>
    <div id="actionButtons"></div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results" class="screen">
  <div class="results-header">
    <div class="results-score" id="finalScore"></div>
    <div class="results-label" id="finalLabel"></div>
    <div class="results-grade" id="finalGrade"></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="statCorrect">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Best Streak</div></div>
    <div class="stat-card"><div class="stat-value" id="statTime">0:00</div><div class="stat-label">Time</div></div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="showScreen('home')">Play Again</button>
    <button class="btn-secondary" onclick="showScreen('leaderboard')">Leaderboard</button>
  </div>
</div>

<!-- LEADERBOARD SCREEN -->
<div id="leaderboard" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>Leaderboard</h2>
    <button class="btn-secondary btn-sm" onclick="showScreen('home')">Back</button>
  </div>
  <div class="lb-tabs">
    <button class="lb-tab active" onclick="filterLeaderboard('all',this)">All</button>
    <button class="lb-tab" onclick="filterLeaderboard(10,this)">Easy</button>
    <button class="lb-tab" onclick="filterLeaderboard(50,this)">Medium</button>
    <button class="lb-tab" onclick="filterLeaderboard(100,this)">Hero</button>
  </div>
  <div id="leaderboardContent"></div>
  <div style="margin-top:12px;text-align:center">
    <button class="btn-danger btn-sm" onclick="clearLeaderboard()">Clear Leaderboard</button>
  </div>
</div>

<!-- NAME MODAL -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h2>Enter Your Name</h2>
    <input type="text" id="playerNameInput" placeholder="Your name" maxlength="20" autofocus>
    <button class="btn-primary" onclick="submitName()" style="width:100%">Save Score</button>
  </div>
</div>

</div>

<script>
// ============================================
// QUESTION BANK
// ============================================
const QUESTIONS = [
// ========== MCQ (1 mark) ==========
// -- Social Influence --
{id:"si1",topic:"Social Influence",type:"mcq",marks:1,text:"In Asch's line experiment, what was the conformity rate on critical trials?",options:["12.5%","36.8%","50%","75%"],correct:1,explanation:"Asch found a conformity rate of approximately 36.8% across critical trials."},
{id:"si2",topic:"Social Influence",type:"mcq",marks:1,text:"In Milgram's original obedience study, what percentage of participants administered the maximum 450V shock?",options:["35%","50%","65%","80%"],correct:2,explanation:"65% of participants went to the maximum 450 volts in Milgram's original study."},
{id:"si3",topic:"Social Influence",type:"mcq",marks:1,text:"Which type of conformity involves publicly agreeing but privately disagreeing?",options:["Internalisation","Identification","Compliance","Obedience"],correct:2,explanation:"Compliance involves publicly conforming but privately maintaining your own views."},
{id:"si4",topic:"Social Influence",type:"mcq",marks:1,text:"What is the term for consistency of a minority's message over time?",options:["Synchronic consistency","Diachronic consistency","Flexibility","Commitment"],correct:1,explanation:"Diachronic consistency refers to maintaining the same message over time."},
{id:"si5",topic:"Social Influence",type:"mcq",marks:1,text:"In Moscovici's blue slide study, what percentage of majority participants called a blue slide green when the minority was consistent?",options:["2%","8%","15%","32%"],correct:1,explanation:"8.42% of responses identified a blue slide as green when exposed to a consistent minority."},
{id:"si6",topic:"Social Influence",type:"mcq",marks:1,text:"Which explanation of obedience proposes that people act as agents carrying out another person's wishes?",options:["Authoritarian personality","Legitimacy of authority","Agentic state","Social identity theory"],correct:2,explanation:"The agentic state theory proposes people shift from an autonomous state to acting as agents of an authority figure."},
{id:"si7",topic:"Social Influence",type:"mcq",marks:1,text:"Normative social influence is based on the desire to:",options:["Be correct","Gain information","Fit in and be accepted","Obey authority"],correct:2,explanation:"Normative social influence is driven by the desire to be liked and accepted by the group."},
{id:"si8",topic:"Social Influence",type:"mcq",marks:1,text:"Informational social influence is most likely to lead to which type of conformity?",options:["Compliance","Identification","Internalisation","Obedience"],correct:2,explanation:"ISI occurs when we look to others for guidance, leading to genuine change in beliefs (internalisation)."},
{id:"si9",topic:"Social Influence",type:"mcq",marks:1,text:"Which of these is NOT a factor that increased obedience in Milgram's variations?",options:["Proximity of authority","Prestigious location","Presence of allies","Wearing a uniform"],correct:2,explanation:"The presence of allies (social support) decreased obedience. When a confederate refused, obedience dropped to 10%."},
{id:"si10",topic:"Social Influence",type:"mcq",marks:1,text:"Which two best describe Zimbardo's prison study? (Select the single best pair)",options:["Lab experiment & covert observation","Controlled observation & participant observation","Natural experiment & case study","Field experiment & self-report"],correct:1,explanation:"Zimbardo's SPE was a controlled observation (standardised setup) and participant observation (Zimbardo acted as superintendent)."},
// -- Memory --
{id:"me1",topic:"Memory",type:"mcq",marks:1,text:"What is the capacity of short-term memory according to Miller?",options:["5 plus or minus 2","7 plus or minus 2","9 plus or minus 2","Unlimited"],correct:1,explanation:"Miller proposed the 'magic number 7 plus or minus 2' for STM capacity."},
{id:"me2",topic:"Memory",type:"mcq",marks:1,text:"Which component of the working memory model acts as the 'boss' directing attention?",options:["Phonological loop","Visuo-spatial sketchpad","Central executive","Episodic buffer"],correct:2,explanation:"The central executive directs attention and allocates resources to the slave systems."},
{id:"me3",topic:"Memory",type:"mcq",marks:1,text:"Episodic memories differ from semantic memories because they are:",options:["Memories of facts and general knowledge","Time-stamped autobiographical events","Procedural skills","Always accurate"],correct:1,explanation:"Episodic memories are personal, time-stamped autobiographical events."},
{id:"me4",topic:"Memory",type:"mcq",marks:1,text:"The encoding specificity principle is associated with which explanation of forgetting?",options:["Proactive interference","Retroactive interference","Retrieval failure","Decay theory"],correct:2,explanation:"Tulving's encoding specificity principle underpins retrieval failure."},
{id:"me5",topic:"Memory",type:"mcq",marks:1,text:"Loftus and Palmer's study of car accident estimates demonstrates:",options:["Proactive interference","The misinformation effect from leading questions","Retrieval failure","Multi-store model validity"],correct:1,explanation:"Loftus and Palmer showed the verb used in a leading question affected speed estimates and false memories."},
{id:"me6",topic:"Memory",type:"mcq",marks:1,text:"Which two components make up the phonological loop?",options:["Inner eye and inner voice","Phonological store and articulatory process","Central executive and episodic buffer","Visual cache and inner scribe"],correct:1,explanation:"The phonological loop consists of the phonological store ('inner ear') and articulatory process ('inner voice')."},
{id:"me7",topic:"Memory",type:"mcq",marks:1,text:"Proactive interference occurs when:",options:["New learning disrupts old memories","Old learning disrupts new memories","Cues are absent at retrieval","Memories decay over time"],correct:1,explanation:"Proactive interference is when previously learned material interferes with recall of newer information."},
{id:"me8",topic:"Memory",type:"mcq",marks:1,text:"The multi-store model was proposed by:",options:["Baddeley and Hitch","Atkinson and Shiffrin","Tulving","Bartlett"],correct:1,explanation:"Atkinson and Shiffrin (1968) proposed the multi-store model with sensory register, STM, and LTM."},
// -- Attachment --
{id:"at1",topic:"Attachment",type:"mcq",marks:1,text:"Which feature of caregiver-infant interaction involves the baby and caregiver taking turns?",options:["Interactional synchrony","Reciprocity","Attachment","Bonding"],correct:1,explanation:"Reciprocity is the turn-taking interaction between infant and caregiver."},
{id:"at2",topic:"Attachment",type:"mcq",marks:1,text:"When a caregiver and infant move in coordination, this is called:",options:["Reciprocity","Interactional synchrony","Imprinting","Monotropy"],correct:1,explanation:"Interactional synchrony is when caregiver and infant mirror each other's actions simultaneously."},
{id:"at3",topic:"Attachment",type:"mcq",marks:1,text:"According to Bowlby, the critical period for attachment formation is approximately:",options:["The first 6 months","The first 2.5 years","The first 5 years","The first 7 years"],correct:1,explanation:"Bowlby proposed a critical period of roughly the first 2.5-3 years."},
{id:"at4",topic:"Attachment",type:"mcq",marks:1,text:"In Ainsworth's Strange Situation, Type B attachment is characterised as:",options:["Insecure-avoidant","Secure","Insecure-resistant","Disorganised"],correct:1,explanation:"Type B is secure attachment: uses caregiver as safe base, distressed on separation, comforted on reunion."},
{id:"at5",topic:"Attachment",type:"mcq",marks:1,text:"Lorenz demonstrated imprinting using which animals?",options:["Dogs","Rhesus monkeys","Greylag geese","Rats"],correct:2,explanation:"Lorenz used greylag geese to demonstrate imprinting."},
{id:"at6",topic:"Attachment",type:"mcq",marks:1,text:"Harlow's research showed infant monkeys preferred:",options:["The wire mother with food","The cloth mother for comfort","Isolation over either","Neither surrogate"],correct:1,explanation:"Harlow showed monkeys preferred the cloth mother for contact comfort over the wire mother with food."},
{id:"at7",topic:"Attachment",type:"mcq",marks:1,text:"Which attachment type shows high separation anxiety but resists comfort on reunion?",options:["Type A: Insecure-avoidant","Type B: Secure","Type C: Insecure-resistant","Type D: Disorganised"],correct:2,explanation:"Type C children show intense distress but resist comfort and are ambivalent on reunion."},
{id:"at8",topic:"Attachment",type:"mcq",marks:1,text:"According to learning theory, before attachment, milk is best described as:",options:["A conditioned stimulus","An unconditioned stimulus","A neutral stimulus","A conditioned response"],correct:1,explanation:"Milk naturally produces pleasure (UCR), making it an unconditioned stimulus before any learning."},
// -- Psychopathology --
{id:"pp1",topic:"Psychopathology",type:"mcq",marks:1,text:"In the two-process model, phobias are acquired through:",options:["Operant conditioning","Social learning","Classical conditioning","Cognitive schemas"],correct:2,explanation:"In Mowrer's two-process model, phobias are acquired through classical conditioning."},
{id:"pp2",topic:"Psychopathology",type:"mcq",marks:1,text:"Beck's cognitive triad involves negative views about:",options:["Past, present, and future","Self, world, and future","Family, work, and health","Thoughts, feelings, and behaviour"],correct:1,explanation:"Beck's negative triad: negative views about the self, the world, and the future."},
{id:"pp3",topic:"Psychopathology",type:"mcq",marks:1,text:"Ellis's ABC model: A stands for:",options:["Antecedent","Activating event","Anxiety","Assessment"],correct:1,explanation:"A = Activating event, B = Belief, C = Consequence."},
{id:"pp4",topic:"Psychopathology",type:"mcq",marks:1,text:"SSRIs work by:",options:["Increasing dopamine","Blocking serotonin reuptake","Reducing noradrenaline","Increasing GABA"],correct:1,explanation:"SSRIs block reuptake of serotonin, increasing its availability at the synapse."},
{id:"pp5",topic:"Psychopathology",type:"mcq",marks:1,text:"Which definition of abnormality focuses on inability to cope with everyday living?",options:["Statistical infrequency","Deviation from social norms","Failure to function adequately","Deviation from ideal mental health"],correct:2,explanation:"Failure to function adequately defines abnormality by whether someone can cope with everyday demands."},
{id:"pp6",topic:"Psychopathology",type:"mcq",marks:1,text:"Which two are emotional characteristics of OCD?",options:["Hypervigilance and obsessive thoughts","Low mood and self-loathing","Compulsions and rituals","Avoidance and withdrawal"],correct:1,explanation:"Emotional characteristics of OCD include low mood and self-loathing."},
// -- Approaches --
{id:"ap1",topic:"Approaches",type:"mcq",marks:1,text:"According to Freud, the ego operates on the:",options:["Pleasure principle","Reality principle","Morality principle","Id principle"],correct:1,explanation:"The ego operates on the reality principle, mediating between id and superego."},
{id:"ap2",topic:"Approaches",type:"mcq",marks:1,text:"The correct order of psychosexual stages is:",options:["Anal, Oral, Phallic, Latency, Genital","Oral, Anal, Phallic, Latency, Genital","Oral, Phallic, Anal, Genital, Latency","Phallic, Oral, Anal, Latency, Genital"],correct:1,explanation:"Freud's stages: Oral, Anal, Phallic, Latency, Genital."},
{id:"ap3",topic:"Approaches",type:"mcq",marks:1,text:"In social learning theory, learning by watching a model being reinforced is called:",options:["Direct reinforcement","Vicarious reinforcement","Negative reinforcement","Self-reinforcement"],correct:1,explanation:"Vicarious reinforcement occurs when we observe a model being rewarded."},
{id:"ap4",topic:"Approaches",type:"mcq",marks:1,text:"Which approach sees humans as information processors, similar to computers?",options:["Biological approach","Behaviourist approach","Cognitive approach","Psychodynamic approach"],correct:2,explanation:"The cognitive approach uses the computer analogy for the mind."},
{id:"ap5",topic:"Approaches",type:"mcq",marks:1,text:"Maslow's hierarchy places which need at the top?",options:["Safety needs","Love and belonging","Esteem","Self-actualisation"],correct:3,explanation:"Self-actualisation is the highest need - achieving one's full potential."},
{id:"ap6",topic:"Approaches",type:"mcq",marks:1,text:"The id is part of which level of the mind?",options:["The conscious mind","The preconscious mind","The unconscious mind","The superego"],correct:2,explanation:"The id is entirely unconscious, operating on the pleasure principle."},
// -- Biopsychology --
{id:"bp1",topic:"Biopsychology",type:"mcq",marks:1,text:"The fight or flight response is triggered by the:",options:["Parasympathetic nervous system","Somatic nervous system","Sympathetic nervous system","Central nervous system"],correct:2,explanation:"The sympathetic division activates the fight or flight response."},
{id:"bp2",topic:"Biopsychology",type:"mcq",marks:1,text:"Which brain structure is the main endogenous pacemaker for the sleep-wake cycle?",options:["Pineal gland","Hypothalamus","Suprachiasmatic nucleus (SCN)","Pituitary gland"],correct:2,explanation:"The SCN acts as the body's master clock, regulating circadian rhythms."},
{id:"bp3",topic:"Biopsychology",type:"mcq",marks:1,text:"Broca's area is associated with:",options:["Speech comprehension","Speech production","Visual processing","Memory formation"],correct:1,explanation:"Broca's area in the left frontal lobe is responsible for speech production."},
{id:"bp4",topic:"Biopsychology",type:"mcq",marks:1,text:"Infradian rhythms have a duration of:",options:["Less than 24 hours","Exactly 24 hours","More than 24 hours","Exactly 28 days"],correct:2,explanation:"Infradian rhythms last MORE than 24 hours (e.g. menstrual cycle ~28 days)."},
{id:"bp5",topic:"Biopsychology",type:"mcq",marks:1,text:"Low serotonin levels have been linked to:",options:["Schizophrenia","OCD and depression","Parkinson's disease","ADHD"],correct:1,explanation:"Low serotonin is implicated in both OCD and depression."},
// -- Research Methods --
{id:"rm1",topic:"Research Methods",type:"mcq",marks:1,text:"A Type I error occurs when:",options:["The null hypothesis is wrongly rejected","The alternative hypothesis is wrongly rejected","The sample is too small","Results can't be replicated"],correct:0,explanation:"A Type I error is a false positive: rejecting the null hypothesis when it is true."},
{id:"rm2",topic:"Research Methods",type:"mcq",marks:1,text:"Data collected first-hand by the researcher is called:",options:["Secondary data","Qualitative data","Primary data","Meta-data"],correct:2,explanation:"Primary data is original data collected directly by the researcher."},
{id:"rm3",topic:"Research Methods",type:"mcq",marks:1,text:"Pearson's r is appropriate when:",options:["Data is nominal, testing for difference","Data is ordinal, testing for association","Data is interval, testing for correlation","Data is nominal, testing for association"],correct:2,explanation:"Pearson's r tests for correlation with interval/ratio level data."},
{id:"rm4",topic:"Research Methods",type:"mcq",marks:1,text:"Demand characteristics threaten:",options:["External validity","Internal validity","Ecological validity","Temporal validity"],correct:1,explanation:"Demand characteristics threaten internal validity because participants change their behaviour."},
// -- Issues & Debates --
{id:"id1",topic:"Issues & Debates",type:"mcq",marks:1,text:"The nomothetic approach aims to:",options:["Study unique individuals in depth","Establish general laws of behaviour","Focus on subjective experience","Reject scientific methods"],correct:1,explanation:"The nomothetic approach seeks general laws applicable to large groups."},
{id:"id2",topic:"Issues & Debates",type:"mcq",marks:1,text:"Androcentrism in psychology refers to:",options:["Cultural bias","A male-centred view","Exaggerating gender differences","Ignoring biology"],correct:1,explanation:"Androcentrism centres psychology around male experience and applies findings to women."},
{id:"id3",topic:"Issues & Debates",type:"mcq",marks:1,text:"Which term best represents the view that biology and environment work together?",options:["Determinism","Ethnocentrism","Holism","Interactionism"],correct:3,explanation:"Interactionism holds that nature and nurture combine to determine behaviour."},
{id:"id4",topic:"Issues & Debates",type:"mcq",marks:1,text:"Cultural relativism is the view that:",options:["One culture is superior to others","Behaviour must be understood within its cultural context","All cultures are the same","Psychology is universally applicable"],correct:1,explanation:"Cultural relativism holds that behaviour/norms can only be understood within their cultural context."},
// -- Schizophrenia --
{id:"sz1",topic:"Schizophrenia",type:"mcq",marks:1,text:"Positive symptoms of schizophrenia include:",options:["Avolition and flat affect","Hallucinations and delusions","Poverty of speech","Social withdrawal"],correct:1,explanation:"Positive symptoms are additional experiences like hallucinations and delusions."},
{id:"sz2",topic:"Schizophrenia",type:"mcq",marks:1,text:"Typical antipsychotics work by:",options:["Increasing serotonin","Blocking dopamine receptors","Increasing GABA","Blocking noradrenaline"],correct:1,explanation:"Typical antipsychotics are dopamine antagonists blocking D2 receptors."},
// -- Relationships --
{id:"rl1",topic:"Relationships",type:"mcq",marks:1,text:"The matching hypothesis suggests people:",options:["Seek the most attractive partner","Form relationships with similarly attractive partners","Prefer opposite partners","Choose partners based on wealth"],correct:1,explanation:"The matching hypothesis proposes people pair with others of similar perceived attractiveness."},
{id:"rl2",topic:"Relationships",type:"mcq",marks:1,text:"Duck's model of relationship breakdown begins with:",options:["Dyadic phase","Social phase","Intra-psychic phase","Grave-dressing phase"],correct:2,explanation:"Duck's model starts with the intra-psychic phase where one partner privately reflects on dissatisfaction."},

// ========== MULTI-SELECT (2-4 marks) ==========
// Select the correct key points from options
{id:"ms1",topic:"Memory",type:"multiselect",marks:2,
  text:"Identify TWO behavioural characteristics of depression.",
  options:["Hallucinations","Changes in sleep patterns","Social withdrawal","Delusions of grandeur","Increased energy"],
  correctIndices:[1,2],
  explanation:"Behavioural characteristics include changes in sleep patterns, changes in eating, social withdrawal, and reduced movement/speech."},
{id:"ms2",topic:"Psychopathology",type:"multiselect",marks:2,
  text:"Which TWO are emotional characteristics of OCD?",
  options:["Hypervigilance","Low mood","Compulsive rituals","Self-loathing","Obsessive thoughts"],
  correctIndices:[1,3],
  explanation:"Emotional characteristics: low mood/anxiety about obsessions, and self-loathing/disgust."},
{id:"ms3",topic:"Attachment",type:"multiselect",marks:2,
  text:"Identify TWO differences between insecure-avoidant and insecure-resistant attachment.",
  options:["Avoidant shows LOW separation anxiety; resistant shows HIGH","Avoidant shows HIGH stranger anxiety; resistant shows LOW","Avoidant shows indifference on reunion; resistant shows ambivalence","Avoidant clings to caregiver; resistant explores independently","Both show identical reunion behaviour"],
  correctIndices:[0,2],
  explanation:"Avoidant: low separation anxiety, indifferent on reunion. Resistant: high separation anxiety, ambivalent (approach then push away) on reunion."},
{id:"ms4",topic:"Social Influence",type:"multiselect",marks:3,
  text:"Identify THREE factors affecting minority influence.",
  options:["Consistency","Group size","Commitment","Unanimity","Flexibility","Obedience"],
  correctIndices:[0,2,4],
  explanation:"The three key factors are consistency (maintaining the same message), commitment (showing personal sacrifice), and flexibility (being willing to adapt while maintaining core position)."},
{id:"ms5",topic:"Memory",type:"multiselect",marks:4,
  text:"Select FOUR techniques used in the cognitive interview.",
  options:["Report everything","Use leading questions","Reinstate the context","Recall in reverse order","Increase pressure on witness","Change perspective","Show photos of suspects"],
  correctIndices:[0,2,3,5],
  explanation:"The four CI techniques: report everything, reinstate the context, recall in reverse/changed order, and change perspective."},
{id:"ms6",topic:"Biopsychology",type:"multiselect",marks:2,
  text:"Which TWO statements about fMRI and ERPs are correct?",
  options:["fMRI has better spatial resolution than ERPs","ERPs have better spatial resolution than fMRI","fMRI has better temporal resolution than ERPs","ERPs have better temporal resolution than fMRI","Both are invasive techniques"],
  correctIndices:[0,3],
  explanation:"fMRI has excellent spatial resolution (millimetre precision). ERPs have excellent temporal resolution (millisecond precision)."},
{id:"ms7",topic:"Approaches",type:"multiselect",marks:2,
  text:"Select TWO correct statements about defence mechanisms.",
  options:["They operate consciously","They protect the ego from anxiety","They are used by the superego only","They work at an unconscious level","They were proposed by Maslow"],
  correctIndices:[1,3],
  explanation:"Defence mechanisms protect the ego from anxiety and operate at an unconscious level."},
{id:"ms8",topic:"Psychopathology",type:"multiselect",marks:4,
  text:"Select FOUR of Jahoda's criteria for ideal mental health.",
  options:["Self-actualisation","Statistical normality","Accurate perception of reality","Resistance to stress","Environmental mastery","High income","Physical fitness"],
  correctIndices:[0,2,3,4],
  explanation:"Jahoda's criteria: self-actualisation, accurate perception of reality, resistance to stress, environmental mastery, autonomy, positive self-attitudes."},
{id:"ms9",topic:"Attachment",type:"multiselect",marks:2,
  text:"Which TWO concepts were introduced by Bowlby?",
  options:["Interactional synchrony","Critical period","Multiple attachment stage","Internal working model","Strange Situation"],
  correctIndices:[1,3],
  explanation:"Bowlby introduced the critical period and the internal working model. Interactional synchrony and multiple attachment stages were identified by other researchers. The Strange Situation was devised by Ainsworth."},
{id:"ms10",topic:"Memory",type:"multiselect",marks:2,
  text:"Select TWO ways episodic memories differ from semantic memories.",
  options:["Episodic involves time and place context; semantic does not","Semantic is autobiographical; episodic is factual","Episodic involves emotional content; semantic does not","Both types are procedural","Semantic requires conscious recall; episodic does not"],
  correctIndices:[0,2],
  explanation:"Episodic memories are time-stamped with contextual and emotional information. Semantic memories are factual knowledge without personal context."},
{id:"ms11",topic:"Research Methods",type:"multiselect",marks:3,
  text:"Select THREE reasons for choosing a chi-squared test.",
  options:["Test of difference or association","Data is at least interval level","Independent groups design","Data is nominal/categorical","Related/repeated measures design","Looking for a correlation"],
  correctIndices:[0,2,3],
  explanation:"Chi-squared: test of association/difference, independent groups, nominal/categorical data."},
{id:"ms12",topic:"Social Influence",type:"multiselect",marks:2,
  text:"Select TWO features that describe Zimbardo's Stanford Prison Experiment.",
  options:["Natural experiment","Controlled observation","Covert observation","Participant observation","Longitudinal study"],
  correctIndices:[1,3],
  explanation:"The SPE was a controlled observation (standardised setup) and participant observation (Zimbardo was superintendent)."},
{id:"ms13",topic:"Psychopathology",type:"multiselect",marks:2,
  text:"According to the two-process model, identify which process acquires a phobia and which maintains it.",
  options:["Classical conditioning acquires; operant conditioning maintains","Operant conditioning acquires; classical conditioning maintains","Social learning acquires; cognitive bias maintains","Both acquired and maintained by classical conditioning"],
  correctIndices:[0],
  explanation:"CC acquires (association of fear with neutral stimulus) and OC maintains (avoidance is negatively reinforced by anxiety relief)."},
{id:"ms14",topic:"Issues & Debates",type:"multiselect",marks:2,
  text:"Select TWO ways psychologists could reduce cultural bias in research.",
  options:["Use cross-cultural research with equivalent methodologies","Only study Western cultures","Use indigenous researchers from the culture being studied","Apply findings from one culture universally","Assume all cultures are identical"],
  correctIndices:[0,2],
  explanation:"Using cross-cultural research and indigenous researchers helps ensure findings are not ethnocentric."},

// ========== 8-MARK ESSAY BUILDER ==========
{id:"e8_1",topic:"Memory",type:"puzzle8",marks:8,
  text:"Outline and evaluate research into duration in memory.",
  pieces:[
    {ao:"AO1",text:"Peterson & Peterson (1959): trigrams + counting backwards. Recall dropped from 80% at 3 seconds to 10% at 18 seconds. STM duration ~15-30 seconds without rehearsal."},
    {ao:"AO1",text:"Bahrick et al. (1974): yearbook study. Recognition was 90% after 15 years and over 50% after 48 years. LTM duration potentially decades."},
    {ao:"AO3",text:"Peterson & Peterson used artificial trigrams which lack ecological validity and may underestimate real-world STM duration."},
    {ao:"AO3",text:"An alternative explanation for Peterson & Peterson is interference (counting backwards displaced information) rather than decay over time."},
    {ao:"AO3",text:"Bahrick's study has higher ecological validity as it used real, meaningful material (photos of classmates) rather than artificial stimuli."},
    {ao:"AO3",text:"However, Bahrick's study cannot control for the frequency with which participants may have rehearsed/encountered old photos over the years."}
  ]},
{id:"e8_2",topic:"Social Influence",type:"puzzle8",marks:8,
  text:"Discuss legitimacy of authority as an explanation for obedience.",
  pieces:[
    {ao:"AO1",text:"Legitimacy of authority: people obey those perceived to hold power in a social hierarchy. Legitimacy is increased by visible symbols such as uniform and the setting/institution."},
    {ao:"AO1",text:"In Milgram's study, Yale University provided legitimacy of setting. The experimenter's grey lab coat provided legitimacy through appearance."},
    {ao:"AO3",text:"Support: Milgram's run-down office variation reduced obedience to 47.5%, showing that location legitimacy affects obedience."},
    {ao:"AO3",text:"Bickman found people were more likely to obey a stranger in a guard's uniform than one in civilian clothes, supporting the role of symbols of authority."},
    {ao:"AO3",text:"A limitation is that legitimacy of authority cannot explain why some people disobey. Individual differences such as locus of control play a role."},
    {ao:"AO3",text:"Hofling's hospital study found 21/22 nurses obeyed a doctor's phone instruction to administer double the maximum dose, demonstrating legitimacy in real-life settings."}
  ]},
{id:"e8_3",topic:"Psychopathology",type:"puzzle8",marks:8,
  text:"Outline and evaluate the genetic explanation for OCD.",
  pieces:[
    {ao:"AO1",text:"OCD is an inherited condition with vulnerability passed across generations. It is polygenic: Taylor (2013) identified 230 candidate genes."},
    {ao:"AO1",text:"Specific genes implicated include the SERT gene (serotonin transporter), COMT gene, and 5HT1-D beta receptor gene. There is aetiological heterogeneity."},
    {ao:"AO3",text:"Twin studies support genetics: Nestadt et al. found 68% concordance for MZ twins vs 32% for DZ twins."},
    {ao:"AO3",text:"However, MZ concordance is not 100%, indicating environmental triggers also play a role. Approximately 50% of OCD cases follow a stressful event."},
    {ao:"AO3",text:"The genetic explanation is biologically reductionist, reducing a complex disorder to genes while ignoring psychological and social factors."},
    {ao:"AO3",text:"A strength is that genetic understanding could lead to gene therapy as a potential future treatment for OCD."}
  ]},
{id:"e8_4",topic:"Attachment",type:"puzzle8",marks:8,
  text:"Discuss the influence of early attachment on childhood and later relationships.",
  pieces:[
    {ao:"AO1",text:"Bowlby's internal working model (IWM) proposes that the first attachment creates a mental template/schema for all future relationships."},
    {ao:"AO1",text:"Securely attached children tend to have better peer relationships. Hazan & Shaver found a correlation between adult attachment style and childhood attachment type."},
    {ao:"AO3",text:"Myron-Wilson & Smith found avoidant children were more likely to be victims of bullying, while resistant children were more likely to be bullies."},
    {ao:"AO3",text:"However, the IWM is deterministic: it implies early attachment permanently shapes relationships, ignoring the possibility of later experiences creating change."},
    {ao:"AO3",text:"The IWM is a hypothetical construct that cannot be directly measured or observed, making it difficult to test scientifically."},
    {ao:"AO3",text:"Retrospective assessment of early attachment in adult studies is unreliable as memories may be distorted over time."}
  ]},
{id:"e8_5",topic:"Biopsychology",type:"puzzle8",marks:8,
  text:"Outline and evaluate split-brain research.",
  pieces:[
    {ao:"AO1",text:"Sperry studied patients who had corpus callosum surgery (for epilepsy). Used visual tests presenting images to specific visual fields."},
    {ao:"AO1",text:"Left hemisphere could verbally identify information from right visual field. Right hemisphere processed left visual field information but couldn't report it verbally."},
    {ao:"AO3",text:"The research provided clear evidence of hemispheric lateralisation and specialisation, revolutionising understanding of brain organisation."},
    {ao:"AO3",text:"The methodology was scientifically rigorous with controlled visual presentations, making findings reliable and replicable."},
    {ao:"AO3",text:"A limitation is that split-brain patients are not representative of the normal population, as their brains have been surgically altered."},
    {ao:"AO3",text:"The extent of corpus callosum disconnection varied between patients, and there were no valid control groups of non-operated patients."}
  ]},
{id:"e8_6",topic:"Approaches",type:"puzzle8",marks:8,
  text:"Discuss consistency and flexibility as processes involved in minority influence.",
  pieces:[
    {ao:"AO1",text:"Consistency means repeating the same message over time (diachronic) and between group members (synchronic). This creates doubt in the majority."},
    {ao:"AO1",text:"Flexibility means acknowledging the majority position and being willing to compromise, avoiding appearing rigid or dogmatic."},
    {ao:"AO3",text:"Moscovici's blue-green slide study found 8% conformity with a consistent minority vs 1.25% with an inconsistent minority, supporting consistency."},
    {ao:"AO3",text:"Nemeth & Brilmayer found that a minority who showed flexibility (compromise) in a jury simulation was more persuasive than a rigid minority."},
    {ao:"AO3",text:"There is an inherent contradiction between consistency and flexibility: being too consistent can seem rigid, while too much flexibility undermines the message."},
    {ao:"AO3",text:"Lab studies use artificial tasks (judging slide colours) which lack ecological validity compared to real-life minority influence situations."}
  ]},
{id:"e8_7",topic:"Psychopathology",type:"puzzle8",marks:8,
  text:"Outline and evaluate the ABC model of depression. Refer to: 'Dropped change at till. Everybody knew I was useless. Why can I not do anything right?'",
  context:"Diary extract: 'Managed to drag myself out of the house but wished I hadn't. Went to the shop but dropped my change at the till. Everybody knew I was useless. Why can I not do anything right? No one else I know does such stupid things.'",
  pieces:[
    {ao:"AO1",text:"Ellis's ABC model: A = Activating event, B = Irrational belief, C = Consequence (depression). Irrational beliefs include musterbation and utopianism."},
    {ao:"AO2",text:"A = dropping change. B = 'everybody knew I was useless', 'no one else does such stupid things' (overgeneralisation). C = continued depression and withdrawal."},
    {ao:"AO3",text:"Alloy et al. found that people with negative thinking styles were more vulnerable to depression, supporting the role of irrational beliefs."},
    {ao:"AO3",text:"Practical application: the ABC model leads to REBT/ABCDE therapy, which disputes irrational beliefs and has been shown effective."},
    {ao:"AO3",text:"A limitation is that it better explains reactive depression (triggered by events) than endogenous depression (arising from biological causes)."},
    {ao:"AO3",text:"Correlation not causation: negative thinking could be a symptom of depression rather than its cause."}
  ]},

// ========== 12-MARK ESSAY BUILDER ==========
{id:"e12_1",topic:"Research Methods",type:"puzzle12",marks:12,
  text:"A researcher designs an experiment to test whether a new study technique improves recall. Design this study, including: hypothesis, variables, experimental design, sampling method, ethical considerations, and how data would be analysed.",
  pieces:[
    {ao:"AO2",text:"Hypothesis: Students using the new technique will recall significantly more words than those using the standard technique (directional)."},
    {ao:"AO2",text:"IV: Study technique (new vs standard). DV: Number of words recalled from a 20-word list. Operationalised and measurable."},
    {ao:"AO2",text:"Independent groups design to avoid order effects. Random allocation to conditions to reduce participant variables."},
    {ao:"AO2",text:"Opportunity sample from a sixth form college. Standardised instructions and word list for all participants."},
    {ao:"AO2",text:"Ethical considerations: informed consent, right to withdraw, debrief. BPS guidelines followed. No deception necessary."},
    {ao:"AO2",text:"Data analysed using an unrelated t-test (interval data, independent groups, test of difference). Significance level set at p<0.05."},
    {ao:"AO3",text:"Independent groups design avoids order effects but introduces participant variables. Random allocation helps but doesn't eliminate individual differences."},
    {ao:"AO3",text:"Opportunity sample is biased and not representative. Volunteer sample would also be biased. Random sample from the target population would be more representative."},
    {ao:"AO3",text:"Lab experiment has high control over extraneous variables but low ecological validity. The controlled word list may not reflect real-world studying."},
    {ao:"AO3",text:"The study could be improved by using a matched pairs design, matching participants on prior academic ability to reduce participant variables."}
  ]},
{id:"e12_2",topic:"Research Methods",type:"puzzle12",marks:12,
  text:"A psychologist investigated the relationship between stress hormones (measured in micrograms per litre) and heart rate (measured in bpm). She used a Pearson's r test and found a correlation of +0.42 with 20 participants. Discuss this study including the statistical analysis.",
  pieces:[
    {ao:"AO2",text:"The correlation of +0.42 indicates a moderate positive relationship: as stress hormones increase, heart rate also tends to increase."},
    {ao:"AO2",text:"Pearson's r was appropriate because: both variables are measured on interval/ratio scales (bpm and micrograms per litre), and a correlation is being tested."},
    {ao:"AO2",text:"With N=20, df=18. At p<0.05 (one-tailed), the critical value is 0.378. Since 0.42 > 0.378, the result IS statistically significant."},
    {ao:"AO2",text:"We can reject the null hypothesis and accept that there is a significant positive correlation between stress hormone levels and heart rate."},
    {ao:"AO3",text:"A correlation only shows a relationship, not causation. A third variable (e.g. exercise, caffeine) could explain both increased hormones and heart rate."},
    {ao:"AO3",text:"The sample of 20 is relatively small, which may limit the generalisability of the findings to the wider population."},
    {ao:"AO3",text:"The study has practical applications: monitoring stress hormones could help identify individuals at risk of stress-related cardiovascular problems."},
    {ao:"AO3",text:"Self-report measures of stress may have been more ecologically valid, as physiological measures capture only one dimension of the stress experience."}
  ]},

// ========== 16-MARK PUZZLES ==========
{id:"p16_1",topic:"Attachment",type:"puzzle16",marks:16,
  text:"Discuss Romanian orphan studies.",
  pieces:[
    {ao:"AO1",text:"Romanian orphans were raised in extremely poor conditions with minimal emotional care after the fall of communism."},
    {ao:"AO1",text:"Rutter's ERA study tracked 165 Romanian adoptees vs 52 British controls, assessed at ages 4, 6, 11, and 15."},
    {ao:"AO1",text:"At age 4, half were intellectually delayed. Recovery rates related to age of adoption: those adopted before 6 months showed near-normal development."},
    {ao:"AO1",text:"Children adopted after 6 months displayed disinhibited attachment, quasi-autism, delayed language, and poor physical growth."},
    {ao:"AO3",text:"Findings suggest early adoption (before 6 months) can mediate the effects of institutionalisation - important implications for care policy."},
    {ao:"AO3",text:"Difficult to generalise because Romanian institutional conditions were extreme compared to typical care situations."},
    {ao:"AO3",text:"Findings suggest Bowlby's critical period may be more of a sensitive period, as children showed some recovery with adequate aftercare."},
    {ao:"AO3",text:"Zeanah et al. used a randomised controlled trial (BEIP), giving the study higher internal validity than natural experiments."},
    {ao:"AO3",text:"A limitation is the lack of long-term adult follow-up data at the time of many studies."},
    {ao:"AO3",text:"Confounding variable: more sociable children may have been selected for adoption, inflating recovery figures."}
  ]},
{id:"p16_2",topic:"Psychopathology",type:"puzzle16",marks:16,
  text:"Discuss the cognitive approach to explaining depression.",
  pieces:[
    {ao:"AO1",text:"Cognitive explanations suggest vulnerability to depression comes from faulty thinking patterns and negative self-schemas."},
    {ao:"AO1",text:"Beck's negative triad: negative views about the self, the world, and the future. Activated by negative experiences in childhood."},
    {ao:"AO1",text:"Beck described faulty information processing including overgeneralisation and magnification of negative events."},
    {ao:"AO1",text:"Ellis's ABC model: Activating events trigger irrational Beliefs (musterbation, utopianism), leading to emotional Consequences."},
    {ao:"AO3",text:"Clark & Beck found cognitive vulnerabilities preceded depression onset, supporting the theory's direction of causation."},
    {ao:"AO3",text:"Practical application: cognitive explanations form the basis of CBT, which has strong evidence for treating depression."},
    {ao:"AO3",text:"Depression may relate more to social circumstances (e.g. poverty) than negative cognitions alone."},

// ============================================
// GAME STATE
// ============================================
let state = {
  mode: 10, topics: [], questions: [], currentIndex: 0,
  score: 0, maxScore: 0, streak: 0, bestStreak: 0,
  startTime: 0, answered: false, puzzleState: null, multiState: null
};

// ============================================
// TOPIC MANAGEMENT
// ============================================
function getTopics() {
  const topics = new Set();
  QUESTIONS.forEach(q => topics.add(q.topic));
  return [...topics].sort();
}

function renderTopics() {
  const grid = document.getElementById('topicGrid');
  const topics = getTopics();
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.topic] = (counts[q.topic] || 0) + 1; });
  grid.innerHTML = topics.map(t => `
    <button class="topic-btn selected" data-topic="${t}" onclick="toggleTopic(this)">
      <div class="topic-name">${t}</div>
      <div class="topic-count">${counts[t]} questions</div>
    </button>
  `).join('');
  state.topics = [...topics];
}

function toggleTopic(btn) {
  btn.classList.toggle('selected');
  const topic = btn.dataset.topic;
  if (btn.classList.contains('selected')) {
    if (!state.topics.includes(topic)) state.topics.push(topic);
  } else {
    state.topics = state.topics.filter(t => t !== topic);
  }
}

function toggleAllTopics() {
  const btns = document.querySelectorAll('.topic-btn');
  const allSelected = [...btns].every(b => b.classList.contains('selected'));
  btns.forEach(b => { allSelected ? b.classList.remove('selected') : b.classList.add('selected'); });
  state.topics = allSelected ? [] : getTopics();
}

// ============================================
// NAVIGATION
// ============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'leaderboard') renderLeaderboard();
  if (id === 'topic-select') renderTopics();
}

function selectMode(n) { state.mode = n; showScreen('topic-select'); }

// ============================================
// GAME LOGIC
// ============================================
function startGame() {
  if (state.topics.length === 0) { alert('Please select at least one topic.'); return; }

  let pool = QUESTIONS.filter(q => state.topics.includes(q.topic));
  pool = shuffle([...pool]);

  // Mix question types proportionally
  const puzzles = pool.filter(q => q.type.startsWith('puzzle'));
  const essays = pool.filter(q => q.type.startsWith('puzzle'));
  const shorts = pool.filter(q => !q.type.startsWith('puzzle'));

  let selected = [];
  const targetExtended = Math.min(essays.length, Math.max(1, Math.floor(state.mode * 0.15)));

  if (state.mode <= pool.length) {
    const extPick = shuffle([...puzzles]).slice(0, targetExtended);
    const shortPick = shuffle(pool.filter(q => !extPick.includes(q))).slice(0, state.mode - extPick.length);
    selected = shuffle([...extPick, ...shortPick]);
  } else {
    selected = shuffle([...pool]);
    while (selected.length < state.mode) selected.push(...shuffle([...pool]));
  }
  selected = selected.slice(0, state.mode);

  state.questions = selected;
  state.currentIndex = 0;
  state.score = 0;
  state.maxScore = selected.reduce((s, q) => s + q.marks, 0);
  state.streak = 0;
  state.bestStreak = 0;
  state.startTime = Date.now();
  state.answered = false;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  state.answered = false;
  state.multiState = null;

  document.getElementById('qNumber').textContent = `${state.currentIndex + 1}/${state.questions.length}`;
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('progressFill').style.width = `${(state.currentIndex / state.questions.length) * 100}%`;
  updateStreak();

  const card = document.getElementById('questionCard');
  card.className = 'card fade-in';
  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('actionButtons').innerHTML = '';

  if (q.type === 'mcq') renderMCQ(q, card);
  else if (q.type === 'multiselect') renderMultiSelect(q, card);
  else if (q.type === 'puzzle8' || q.type === 'puzzle12' || q.type === 'puzzle16') renderPuzzle(q, card);

  updateTimer();
}

// ============================================
// MCQ (1 mark)
// ============================================
function renderMCQ(q, card) {
  card.innerHTML = `
    <div class="question-meta">
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-marks">${q.marks} mark${q.marks > 1 ? 's' : ''}</span>
    </div>
    ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
    <div class="question-text">${q.text}</div>
    <div class="options-list">
      ${q.options.map((opt, i) => `
        <button class="option-btn" data-idx="${i}" onclick="selectMCQ(${i})">
          <span class="option-letter">${String.fromCharCode(65 + i)}</span>${opt}
        </button>
      `).join('')}
    </div>
  `;
}

function selectMCQ(idx) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.add('locked'));
  const isCorrect = idx === q.correct;
  btns[q.correct].classList.add('correct');
  if (!isCorrect) { btns[idx].classList.add('incorrect'); btns[idx].classList.add('shake'); }
  if (isCorrect) { state.score += q.marks; state.streak++; if (state.streak > state.bestStreak) state.bestStreak = state.streak; }
  else { state.streak = 0; }
  document.getElementById('scoreDisplay').textContent = state.score;
  updateStreak();
  showFeedback(isCorrect, q.explanation, isCorrect ? q.marks : 0, q.marks);
  showNextButton();
}

// ============================================
// MULTI-SELECT (2-4 marks)
// ============================================
function renderMultiSelect(q, card) {
  const needed = q.correctIndices.length;
  state.multiState = { selected: new Set() };

  card.innerHTML = `
    <div class="question-meta">
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-marks">${q.marks} marks</span>
      <span class="badge badge-type">Select ${needed}</span>
    </div>
    ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
    <div class="question-text">${q.text}</div>
    <div class="multi-hint">Select ${needed} correct answer${needed > 1 ? 's' : ''}</div>
    <div id="multiOptions">
      ${q.options.map((opt, i) => `
        <div class="keypoint-item" data-idx="${i}" onclick="toggleMulti(${i})">
          <div class="keypoint-check"></div>
          <div>${opt}</div>
        </div>
      `).join('')}
    </div>
    <div class="multi-submit-bar">
      <button class="btn-primary" onclick="submitMulti()" id="multiSubmitBtn">Submit Answer</button>
      <span class="multi-counter" id="multiCounter">0/${needed} selected</span>
    </div>
  `;
}

function toggleMulti(idx) {
  if (state.answered) return;
  const ms = state.multiState;
  const q = state.questions[state.currentIndex];
  const needed = q.correctIndices.length;

  if (ms.selected.has(idx)) {
    ms.selected.delete(idx);
  } else {
    if (ms.selected.size >= needed) return;
    ms.selected.add(idx);
  }

  document.querySelectorAll('#multiOptions .keypoint-item').forEach(el => {
    const i = parseInt(el.dataset.idx);
    el.classList.toggle('selected', ms.selected.has(i));
  });
  document.getElementById('multiCounter').textContent = `${ms.selected.size}/${needed} selected`;
}

function submitMulti() {
  if (state.answered) return;
  const q = state.questions[state.currentIndex];
  const ms = state.multiState;
  if (ms.selected.size === 0) return;
  state.answered = true;

  const correctSet = new Set(q.correctIndices);
  let earned = 0;

  document.querySelectorAll('#multiOptions .keypoint-item').forEach(el => {
    const i = parseInt(el.dataset.idx);
    el.classList.add('locked');
    el.onclick = null;

    if (ms.selected.has(i)) {
      if (correctSet.has(i)) { el.classList.remove('selected'); el.classList.add('correct'); earned++; }
      else { el.classList.remove('selected'); el.classList.add('incorrect'); }
    } else if (correctSet.has(i)) {
      el.classList.add('missed');
    }
  });

  // Scale marks proportionally
  const pct = earned / q.correctIndices.length;
  const marksEarned = Math.round(pct * q.marks);

  if (pct >= 0.8) { state.score += marksEarned; state.streak++; if (state.streak > state.bestStreak) state.bestStreak = state.streak; }
  else if (pct > 0) { state.score += marksEarned; state.streak = 0; }
  else { state.streak = 0; }

  document.getElementById('scoreDisplay').textContent = state.score;
  updateStreak();

  const isCorrect = pct >= 0.8;
  const isPartial = pct > 0 && pct < 0.8;
  showFeedback(isCorrect, q.explanation, marksEarned, q.marks, isPartial);
  showNextButton();
}

// ============================================
// PUZZLE (8, 12, 16 mark)
// ============================================
function renderPuzzle(q, card) {
  const shuffledPieces = shuffle(q.pieces.map((p, i) => ({...p, origIdx: i})));
  const aoTypes = [...new Set(q.pieces.map(p => p.ao))].sort();

  state.puzzleState = {
    pieces: shuffledPieces,
    zones: {},
    bank: shuffledPieces.map((_, i) => i),
    question: q
  };
  aoTypes.forEach(ao => state.puzzleState.zones[ao] = []);

  const markLabel = q.marks === 8 ? '8-mark essay' : q.marks === 12 ? '12-mark essay' : '16-mark essay';
  const aoBadges = aoTypes.map(ao => `<span class="badge badge-${ao.toLowerCase()}">${ao}</span>`).join('');

  card.innerHTML = `
    <div class="question-meta">
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-marks">${q.marks} marks</span>
      <span class="badge badge-type">${markLabel}</span>
      ${aoBadges}
    </div>
    ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
    <div class="question-text">${q.text}</div>
    <div class="puzzle-intro">Drag the pieces into the correct AO category. Each piece is colour-coded by its correct type.</div>
    ${aoTypes.map(ao => `
      <div class="puzzle-zone-label"><span class="dot dot-${ao.toLowerCase()}"></span> ${ao} ${ao === 'AO1' ? '(Knowledge)' : ao === 'AO2' ? '(Application)' : '(Evaluation)'}</div>
      <div class="puzzle-zone" id="zone-${ao}" data-ao="${ao}"
           ondragover="puzzleDragOver(event)" ondrop="puzzleDrop(event)" ondragleave="puzzleDragLeave(event)">
      </div>
    `).join('')}
    <div class="puzzle-pieces-bank" id="puzzleBank" ondragover="puzzleDragOver(event)" ondrop="puzzleDropBank(event)" ondragleave="puzzleDragLeave(event)">
      <div class="puzzle-pieces-bank-label">Available Pieces</div>
      <div id="bankPieces">
        ${shuffledPieces.map((p, i) => puzzlePieceHTML(p, i)).join('')}
      </div>
    </div>
    <button class="btn-primary" onclick="submitPuzzle()">Submit Answer</button>
  `;
  initTouchDrag();
}

function puzzlePieceHTML(piece, idx) {
  return `<div class="puzzle-piece ${piece.ao.toLowerCase()}" draggable="true" data-idx="${idx}"
    ondragstart="puzzleDragStart(event)">${piece.text}</div>`;
}

function puzzleDragStart(e) {
  e.dataTransfer.setData('text/plain', e.target.dataset.idx);
  e.dataTransfer.effectAllowed = 'move';
}

function puzzleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function puzzleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function puzzleDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const idx = parseInt(e.dataTransfer.getData('text/plain'));
  const targetAO = e.currentTarget.dataset.ao;
  removePieceFromAll(idx);
  state.puzzleState.zones[targetAO].push(idx);
  renderPuzzleState();
}

function puzzleDropBank(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const idx = parseInt(e.dataTransfer.getData('text/plain'));
  removePieceFromAll(idx);
  state.puzzleState.bank.push(idx);
  renderPuzzleState();
}

function removePieceFromAll(idx) {
  const ps = state.puzzleState;
  ps.bank = ps.bank.filter(i => i !== idx);
  for (const ao of Object.keys(ps.zones)) ps.zones[ao] = ps.zones[ao].filter(i => i !== idx);
}

function renderPuzzleState() {
  const ps = state.puzzleState;
  for (const ao of Object.keys(ps.zones)) {
    const zone = document.getElementById(`zone-${ao}`);
    if (!zone) continue;
    zone.innerHTML = ps.zones[ao].map(idx => {
      const p = ps.pieces[idx];
      return `<div class="puzzle-piece ${p.ao.toLowerCase()} in-zone" draggable="true" data-idx="${idx}"
        ondragstart="puzzleDragStart(event)">${p.text}</div>`;
    }).join('') || '';
  }
  const bankEl = document.getElementById('bankPieces');
  if (bankEl) {
    bankEl.innerHTML = ps.bank.map(idx => puzzlePieceHTML(ps.pieces[idx], idx)).join('')
      || '<span style="color:var(--muted);font-size:0.85rem">All pieces placed!</span>';
  }
  initTouchDrag();
}

function submitPuzzle() {
  if (state.answered) return;
  state.answered = true;
  const ps = state.puzzleState;
  const q = ps.question;
  let correct = 0, total = q.pieces.length;

  for (const ao of Object.keys(ps.zones)) {
    for (const idx of ps.zones[ao]) { if (ps.pieces[idx].ao === ao) correct++; }
  }

  const pct = correct / total;
  const earned = Math.round(pct * q.marks);
  state.score += earned;

  if (pct >= 0.8) { state.streak++; if (state.streak > state.bestStreak) state.bestStreak = state.streak; }
  else { state.streak = 0; }

  document.getElementById('scoreDisplay').textContent = state.score;
  updateStreak();

  // Mark pieces
  for (const ao of Object.keys(ps.zones)) {
    const zone = document.getElementById(`zone-${ao}`);
    if (!zone) continue;
    zone.querySelectorAll('.puzzle-piece').forEach(div => {
      const idx = parseInt(div.dataset.idx);
      div.draggable = false;
      if (ps.pieces[idx].ao === ao) div.classList.add('correct-pos');
      else { div.classList.add('incorrect-pos'); div.innerHTML += ` <span style="font-size:0.75rem;font-weight:600;color:var(--error);">(${ps.pieces[idx].ao})</span>`; }
    });
  }
  document.querySelectorAll('#bankPieces .puzzle-piece').forEach(div => { div.draggable = false; div.classList.add('incorrect-pos'); });

  const msg = pct >= 0.8 ? `Excellent! ${correct}/${total} pieces correct.`
    : pct >= 0.4 ? `Good effort! ${correct}/${total} pieces correct.`
    : `${correct}/${total} pieces correct. Review the AO classifications above.`;

  showFeedback(pct >= 0.8, msg, earned, q.marks, pct >= 0.4 && pct < 0.8);
  showNextButton();
}

// ============================================
// TOUCH DRAG
// ============================================
function initTouchDrag() {
  document.querySelectorAll('.puzzle-piece[draggable="true"]').forEach(piece => {
    piece.addEventListener('touchstart', touchStart, {passive: false});
  });
}
let touchDragEl = null, touchClone = null;
function touchStart(e) {
  e.preventDefault();
  touchDragEl = e.target.closest('.puzzle-piece');
  if (!touchDragEl) return;
  touchClone = touchDragEl.cloneNode(true);
  touchClone.style.cssText = 'position:fixed;pointer-events:none;opacity:0.8;z-index:1000;width:'+touchDragEl.offsetWidth+'px';
  document.body.appendChild(touchClone);
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - 20)+'px';
  touchClone.style.top = (t.clientY - 20)+'px';
  document.addEventListener('touchmove', touchMove, {passive:false});
  document.addEventListener('touchend', touchEnd, {passive:false});
}
function touchMove(e) { e.preventDefault(); if (!touchClone) return; const t=e.touches[0]; touchClone.style.left=(t.clientX-20)+'px'; touchClone.style.top=(t.clientY-20)+'px'; }
function touchEnd(e) {
  if (!touchDragEl||!touchClone) return;
  document.removeEventListener('touchmove',touchMove);
  document.removeEventListener('touchend',touchEnd);
  const t=e.changedTouches[0]; touchClone.remove(); touchClone=null;
  const target=document.elementFromPoint(t.clientX,t.clientY);
  if(!target) return;
  const zone=target.closest('.puzzle-zone'), bank=target.closest('.puzzle-pieces-bank');
  const idx=parseInt(touchDragEl.dataset.idx);
  if(zone&&zone.dataset.ao){removePieceFromAll(idx);state.puzzleState.zones[zone.dataset.ao].push(idx);renderPuzzleState();}
  else if(bank){removePieceFromAll(idx);state.puzzleState.bank.push(idx);renderPuzzleState();}
  touchDragEl=null;
}

// ============================================
// FEEDBACK & NAV
// ============================================
function showFeedback(correct, msg, earned, total, partial) {
  const type = correct ? 'correct' : (partial ? 'partial' : 'incorrect');
  const prefix = correct ? 'Correct!' : (partial ? 'Partial Credit' : 'Incorrect');
  document.getElementById('feedbackBox').innerHTML = `
    <div class="feedback ${type} fade-in">
      <strong>${prefix}</strong> ${earned !== undefined ? `(${earned}/${total} marks)` : ''}<br>
      <span class="feedback-answer">${msg}</span>
    </div>`;
}

function showNextButton() {
  const isLast = state.currentIndex >= state.questions.length - 1;
  document.getElementById('actionButtons').innerHTML = `
    <button class="btn-primary" onclick="${isLast ? 'finishGame()' : 'nextQuestion()'}">${isLast ? 'See Results' : 'Next'}</button>`;
}

function nextQuestion() { state.currentIndex++; renderQuestion(); }

function finishGame() {
  document.getElementById('progressFill').style.width = '100%';
  const elapsed = Date.now() - state.startTime;
  const pct = Math.round((state.score / state.maxScore) * 100);
  const mins = Math.floor(elapsed / 60000);
  const secs = Math.floor((elapsed % 60000) / 1000);
  document.getElementById('finalScore').textContent = `${pct}%`;
  document.getElementById('finalLabel').textContent = `${state.score} / ${state.maxScore} marks`;
  document.getElementById('finalGrade').textContent = getGrade(pct);
  document.getElementById('statCorrect').textContent = `${state.score}/${state.maxScore}`;
  document.getElementById('statStreak').textContent = state.bestStreak;
  document.getElementById('statTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  showScreen('results');
  setTimeout(() => { document.getElementById('nameModal').classList.add('active'); document.getElementById('playerNameInput').focus(); }, 500);
}

function getGrade(pct) {
  if (pct >= 90) return 'A*'; if (pct >= 80) return 'A'; if (pct >= 70) return 'B';
  if (pct >= 60) return 'C'; if (pct >= 50) return 'D'; if (pct >= 40) return 'E'; return 'U';
}

function submitName() {
  const name = document.getElementById('playerNameInput').value.trim() || 'Anonymous';
  document.getElementById('nameModal').classList.remove('active');
  document.getElementById('playerNameInput').value = '';
  const elapsed = Date.now() - state.startTime;
  const pct = Math.round((state.score / state.maxScore) * 100);
  saveToLeaderboard({ name, score: state.score, maxScore: state.maxScore, pct, mode: state.mode, streak: state.bestStreak, time: elapsed, date: new Date().toISOString() });
}

document.getElementById('playerNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });

// ============================================
// STREAK & TIMER
// ============================================
function updateStreak() {
  const el = document.getElementById('streakDisplay');
  el.innerHTML = state.streak >= 3 ? `<span class="streak-fire">&#128293;</span>${state.streak}` : '';
}

function updateTimer() {
  const el = document.getElementById('timerDisplay');
  const update = () => {
    if (!document.getElementById('quiz').classList.contains('active')) return;
    const elapsed = Date.now() - state.startTime;
    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    el.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    requestAnimationFrame(update);
  };
  update();
}

// ============================================
// LEADERBOARD
// ============================================
function getLeaderboard() { try { return JSON.parse(localStorage.getItem('psych_leaderboard') || '[]'); } catch { return []; } }
function saveToLeaderboard(entry) {
  const lb = getLeaderboard(); lb.push(entry);
  lb.sort((a, b) => b.pct - a.pct || a.time - b.time);
  localStorage.setItem('psych_leaderboard', JSON.stringify(lb.slice(0, 100)));
}

let currentLBFilter = 'all';
function filterLeaderboard(mode, btn) {
  currentLBFilter = mode;
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderLeaderboard();
}

function renderLeaderboard() {
  let lb = getLeaderboard();
  if (currentLBFilter !== 'all') lb = lb.filter(e => e.mode === currentLBFilter);
  const container = document.getElementById('leaderboardContent');
  if (lb.length === 0) { container.innerHTML = '<div class="lb-empty">No scores yet. Play a quiz to get started!</div>'; return; }
  const modeColors = {10:'#dcfce7',50:'#fef3c7',100:'#fce7f3'};
  const modeLabels = {10:'Easy',50:'Medium',100:'Hero'};
  container.innerHTML = `<table class="lb-table">
    <thead><tr><th>#</th><th>Name</th><th>Score</th><th>Mode</th><th>Streak</th><th>Time</th></tr></thead>
    <tbody>${lb.slice(0, 20).map((e, i) => {
      const mins = Math.floor(e.time / 60000);
      const secs = Math.floor((e.time % 60000) / 1000);
      return `<tr><td class="lb-rank">${i+1}</td><td>${escHTML(e.name)}</td>
        <td><strong>${e.pct}%</strong> <span style="color:var(--muted);font-size:0.8rem">(${e.score}/${e.maxScore})</span></td>
        <td><span class="lb-mode" style="background:${modeColors[e.mode]}">${modeLabels[e.mode]}</span></td>
        <td>${e.streak}</td><td>${mins}:${secs.toString().padStart(2, '0')}</td></tr>`;
    }).join('')}</tbody></table>`;
}

function clearLeaderboard() { if (confirm('Clear all leaderboard data?')) { localStorage.removeItem('psych_leaderboard'); renderLeaderboard(); } }

// ============================================
// UTILITIES
// ============================================
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function escHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
document.getElementById('nameModal').addEventListener('click', e => { if (e.target === e.currentTarget) submitName(); });
document.getElementById('fullscreenLink').href = window.location.href;
</script>
